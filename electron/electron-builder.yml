appId: com.njordhr.desktop
productName: NjordHR
directories:
  output: ../build/electron
  buildResources: buildResources
files:
  - src/**/*
extraResources:
  - from: ../backend_server.py
    to: app/backend_server.py
  - from: ../agent_server.py
    to: app/agent_server.py
  - from: ../frontend.html
    to: app/frontend.html
  - from: ../requirements.txt
    to: app/requirements.txt
artifactName: NjordHR-Electron-${version}-${os}.${ext}
mac:
  category: public.app-category.business
win:
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
