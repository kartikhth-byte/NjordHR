<body class="bg-gray-100">
    <div id="root"></div>

    <script>
        window.NjordAiSearchState = (() => {
            const HISTORY_MESSAGE = 'You are viewing an earlier result set. Return to latest results to refine further.';
            const NO_VERIFIED_MESSAGE = 'No verified matches are available to refine.';
            const FILTER_INVALIDATED_MESSAGE = 'Displayed results belong to an earlier filter context. Run a new search to enable refinement.';
            const DEFAULT_RECOVERED_REASON = 'Recovered results are not refinable.';

            const chainArray = (searchChain) => (Array.isArray(searchChain) ? searchChain : []);
            const verifiedCount = (results) => (
                Array.isArray(results?.verified_matches) ? results.verified_matches.length : 0
            );
            const sessionId = (results) => String(results?.search_session?.search_session_id || '');

            const latestSearchStepIndex = (searchChain) => chainArray(searchChain).length - 1;

            const isViewingHistoricalSearchStep = (searchChain, activeSearchStepIndex) => {
                const latestIndex = latestSearchStepIndex(searchChain);
                return (
                    latestIndex >= 0
                    && Number(activeSearchStepIndex) >= 0
                    && Number(activeSearchStepIndex) < latestIndex
                );
            };

            const activeHistoricalSearchPrompt = (searchChain, activeSearchStepIndex) => (
                isViewingHistoricalSearchStep(searchChain, activeSearchStepIndex)
                    ? String(chainArray(searchChain)[activeSearchStepIndex]?.prompt || '')
                    : ''
            );

            const displayedAiPrompt = ({ searchChain, activeSearchStepIndex, aiPrompt }) => (
                isViewingHistoricalSearchStep(searchChain, activeSearchStepIndex)
                    ? activeHistoricalSearchPrompt(searchChain, activeSearchStepIndex)
                    : aiPrompt
            );

            const latestSearchResults = (searchChain, fallbackResults) => {
                const chain = chainArray(searchChain);
                if (chain.length === 0) return fallbackResults || null;
                return chain[chain.length - 1]?.results || null;
            };

            const currentParentSearchSessionId = ({
                searchChain,
                fallbackResults,
                refinementAvailability,
            }) => (
                sessionId(latestSearchResults(searchChain, fallbackResults))
                || String(refinementAvailability?.parentSearchSessionId || '')
            );

            const buildNextSearchChain = ({
                previousChain,
                step,
                isRefinement,
                maxSteps = 10,
            }) => {
                const safeLimit = Math.max(1, Number(maxSteps) || 10);
                const nextChain = isRefinement ? [...chainArray(previousChain), step] : [step];
                return nextChain.slice(-safeLimit);
            };

            const deriveSearchStepView = (index, searchChain) => {
                const chain = chainArray(searchChain);
                if (chain.length === 0) return null;
                const boundedIndex = Math.max(0, Math.min(Number(index) || 0, chain.length - 1));
                const step = chain[boundedIndex];
                if (!step?.results) return null;
                const count = verifiedCount(step.results);
                const refinement = step.results?.refinement || {};
                const isLatestStep = boundedIndex === chain.length - 1;
                const candidateCount = Number(refinement.candidate_scope_member_count || count);
                const latestAvailable = isLatestStep && count > 0 && Boolean(refinement.available);
                return {
                    boundedIndex,
                    step,
                    results: step.results,
                    verifiedCount: count,
                    isLatestStep,
                    refinementAvailability: {
                        available: latestAvailable,
                        candidateCount,
                        reason: isLatestStep
                            ? (refinement.message || (count ? '' : NO_VERIFIED_MESSAGE))
                            : HISTORY_MESSAGE,
                        parentSearchSessionId: isLatestStep ? sessionId(step.results) : '',
                    },
                    refinementState: isLatestStep
                        ? (count === 0 ? 'active_zero_result' : (latestAvailable ? 'active_idle' : 'disabled'))
                        : 'viewing_history',
                    refinementMode: isLatestStep ? null : true,
                };
            };

            const removeLatestRefinement = (searchChain) => {
                const chain = chainArray(searchChain);
                if (chain.length < 2) {
                    return { canRemove: false, chain, prompt: '', view: null };
                }
                const nextChain = chain.slice(0, -1);
                const view = deriveSearchStepView(nextChain.length - 1, nextChain);
                return {
                    canRemove: true,
                    chain: nextChain,
                    prompt: String(nextChain[nextChain.length - 1]?.prompt || ''),
                    view,
                };
            };

            const shouldInvalidateRefinementForFilterChange = ({ analysisResults, refinementMode }) => (
                Boolean(analysisResults) && !Boolean(refinementMode)
            );

            const invalidatedRefinementAvailability = () => ({
                available: false,
                candidateCount: 0,
                reason: FILTER_INVALIDATED_MESSAGE,
                parentSearchSessionId: '',
            });

            const completedSearchSnapshot = ({
                prompt,
                analysisResults,
                searchChain,
                activeSearchStepIndex,
                refinementMode,
                refinementState,
                refinementAvailability,
            }) => {
                const chain = chainArray(searchChain);
                const rawIndex = Number(activeSearchStepIndex);
                const boundedIndex = chain.length > 0
                    ? Math.max(
                        0,
                        Math.min(
                            Number.isFinite(rawIndex) ? rawIndex : chain.length - 1,
                            chain.length - 1,
                        ),
                    )
                    : -1;
                const restoredResults = analysisResults
                    || (boundedIndex >= 0 ? chain[boundedIndex]?.results || null : null);
                if (!restoredResults && chain.length === 0) return null;
                const snapshotPrompt = boundedIndex >= 0
                    ? String(chain[boundedIndex]?.prompt || prompt || '')
                    : String(prompt || '');
                return {
                    prompt: snapshotPrompt,
                    analysisResults: restoredResults || null,
                    searchChain: chain.map(step => ({
                        prompt: String(step?.prompt || ''),
                        results: step?.results || null,
                    })),
                    activeSearchStepIndex: boundedIndex,
                    refinementMode: Boolean(refinementMode),
                    refinementState: String(refinementState || 'disabled'),
                    refinementAvailability: refinementAvailability ? { ...refinementAvailability } : {
                        available: false,
                        candidateCount: 0,
                        reason: DEFAULT_RECOVERED_REASON,
                        parentSearchSessionId: '',
                    },
                };
            };

            const deriveRecoveredSearchState = (state) => {
                const restoredChain = chainArray(state?.search_chain);
                const rawRestoredIndex = Number(state?.active_search_step_index);
                const restoredIndex = restoredChain.length > 0
                    ? Math.max(
                        0,
                        Math.min(
                            Number.isFinite(rawRestoredIndex) ? rawRestoredIndex : restoredChain.length - 1,
                            restoredChain.length - 1,
                        ),
                    )
                    : -1;
                const restoredResults = restoredIndex >= 0
                    ? restoredChain[restoredIndex]?.results || state?.current_completed_results || null
                    : state?.current_completed_results || null;
                const refinementAvailability = state?.refinement_availability || {
                    available: false,
                    candidateCount: 0,
                    reason: DEFAULT_RECOVERED_REASON,
                    parentSearchSessionId: '',
                };
                const storedRefinementState = state?.refinement_state || 'disabled';
                const recoveredRefinementState = storedRefinementState === 'active_running'
                    ? (restoredResults && refinementAvailability?.available ? 'active_idle' : 'disabled')
                    : storedRefinementState;
                const restoredViewingHistory = restoredIndex >= 0 && restoredIndex < restoredChain.length - 1;
                const latestRestoredResults = restoredChain.length > 0
                    ? restoredChain[restoredChain.length - 1]?.results
                    : restoredResults;
                return {
                    prompt: state?.prompt || '',
                    selectedRankFolder: state?.selected_rank_folder || '',
                    appliedShipType: state?.applied_ship_type || '',
                    experiencedShipType: state?.experienced_ship_type || '',
                    experienceShipTypeFilter: state?.experience_ship_type_filter || {},
                    engineExperienceFilter: state?.engine_experience_filter || {},
                    vesselTonnageFilter: state?.vessel_tonnage_filter || {},
                    restoredChain,
                    restoredIndex,
                    restoredResults,
                    refinementAvailability,
                    refinementMode: restoredViewingHistory || ['active_idle', 'active_zero_result'].includes(recoveredRefinementState),
                    refinementState: restoredViewingHistory ? 'viewing_history' : recoveredRefinementState,
                    parentSearchSessionIdForPreflight: String(
                        refinementAvailability?.parentSearchSessionId
                        || sessionId(latestRestoredResults)
                        || '',
                    ),
                };
            };

            const streamFailureRecoveryState = ({ isRefinement, completedSearchSnapshot: snapshot = null }) => {
                const restoreCompletedResults = !isRefinement && snapshot?.analysisResults ? snapshot : null;
                return {
                    preserveCompletedResults: true,
                    restoreCompletedResults,
                    refinementState: isRefinement
                        ? 'active_idle'
                        : (restoreCompletedResults ? restoreCompletedResults.refinementState : null),
                    serviceRecovery: {
                        state: 'backend_unreachable',
                        message: 'NjordHR service is unavailable.',
                        recovering: false,
                    },
                };
            };

            return {
                HISTORY_MESSAGE,
                FILTER_INVALIDATED_MESSAGE,
                latestSearchStepIndex,
                isViewingHistoricalSearchStep,
                activeHistoricalSearchPrompt,
                displayedAiPrompt,
                latestSearchResults,
                currentParentSearchSessionId,
                buildNextSearchChain,
                deriveSearchStepView,
                removeLatestRefinement,
                shouldInvalidateRefinementForFilterChange,
                invalidatedRefinementAvailability,
                completedSearchSnapshot,
                deriveRecoveredSearchState,
                streamFailureRecoveryState,
            };
        })();
    </script>

    <script>
        window.NjordReasonFormatting = (() => {
            const familyOptionValue = (option) => (
                option && typeof option === 'object'
                    ? String(option.value || '')
                    : String(option || '')
            );

            const familyOptionLabel = (option) => (
                option && typeof option === 'object'
                    ? String(option.label || option.value || '')
                    : String(option || '')
            );

            const normalizeFamilyOptionKey = (value) => String(value || '')
                .trim()
                .toLowerCase()
                .replace(/-/g, '_')
                .replace(/\s+/g, '_');

            const normalizeReasonDisplayLine = (value) => String(value || '')
                .replace(/\s+/g, ' ')
                .trim()
                .replace(/[.;\s]+$/g, '')
                .toLowerCase();

            const humanizeReasonCode = (value) => {
                const text = String(value || '').trim();
                if (!text) return '';
                return text
                    .toLowerCase()
                    .replace(/_/g, ' ')
                    .replace(/\bapi\b/g, 'API')
                    .replace(/\bcoc\b/g, 'CoC')
                    .replace(/\bstcw\b/g, 'STCW')
                    .trim();
            };

            const HARD_FILTER_REASON_PRESENTERS = [
                { prefix: 'PASSPORT_', group: 'matchedFilters' },
                { prefix: 'VESSEL_TONNAGE_', group: 'matchedFilters' },
                { prefix: 'EXPERIENCE_SHIP_TYPE_', group: 'matchedFilters' },
                { prefix: 'APPLIED_SHIP_TYPE_', group: 'matchedFilters' },
                { prefix: 'RANK_DURATION_', group: 'matchedFilters' },
                { prefix: 'RECENT_CONTRACT_', group: 'matchedFilters' },
                { prefix: 'ENGINE_EXPERIENCE_', group: 'matchedFilters' },
                { prefix: 'ENGINE_VESSEL_EXPERIENCE_', group: 'matchedFilters' },
                { prefix: 'US_VISA_', group: 'matchedFilters' },
                { prefix: 'SCHENGEN_VISA_', group: 'matchedFilters' },
                { prefix: 'AUSTRALIA_VISA_', group: 'matchedFilters' },
                { prefix: 'STCW_', group: 'matchedFilters' },
                { prefix: 'CERTIFICATE_', group: 'matchedFilters' },
                { prefix: 'RANK_MATCH_', group: 'matchedFilters' },
                { prefix: 'AGE_', group: 'matchedFilters' },
            ];

            const REASON_GROUP_META = {
                primary: { heading: 'AI Match Summary', itemClass: 'text-sm text-gray-700' },
                matchedFilters: { heading: 'Matched Filters', itemClass: 'text-xs text-slate-500' },
                recruiterChecks: { heading: 'Default Recruiter Checks', itemClass: 'text-xs text-slate-500' },
                context: { heading: 'Resume Context', itemClass: 'text-xs text-slate-500' },
            };

            const splitReasonIntoDisplayLines = (value) => {
                const text = String(value || '').trim();
                if (!text) return [];
                return text
                    .split(/\s*;\s*/g)
                    .map(part => part.trim())
                    .filter(Boolean);
            };

            const ensureSentence = (value) => {
                const text = String(value || '').trim();
                if (!text) return '';
                return /[.!?]$/.test(text) ? text : `${text}.`;
            };

            const stripRequestedFilterSuffix = (value) => String(value || '')
                .replace(/\s+for requested filter\s+'[^']+'\.*$/i, '')
                .trim();

            const formatTonnageNumber = (value) => {
                if (typeof value !== 'number' || !Number.isFinite(value)) return '';
                return value.toLocaleString();
            };

            const formatTonnageUnitSuffix = (unit) => {
                const normalized = String(unit || 'unspecified').trim().toLowerCase();
                if (!normalized || normalized === 'any' || normalized === 'unspecified') return '(unit unspecified)';
                if (normalized === 'gt_grt') return 'GT/GRT';
                if (normalized === 'dwt') return 'DWT';
                return normalized.toUpperCase();
            };

            const formatTonnageValueForDisplay = (value, unit) => {
                const formattedNumber = formatTonnageNumber(value);
                if (!formattedNumber) return '';
                return `${formattedNumber} ${formatTonnageUnitSuffix(unit)}`.trim();
            };

            const formatShipTypeMatchMessage = (message, prefix) => {
                const normalizedPrefix = String(prefix || '').trim();
                const normalizedMessage = String(message || '').trim();
                if (!normalizedMessage) return '';
                const exactMatch = normalizedMessage.match(/matching\s+'([^']+)'/i);
                if (exactMatch) {
                    return `${normalizedPrefix} matches '${exactMatch[1]}'.`;
                }
                return ensureSentence(
                    normalizedMessage
                        .replace(/^Candidate has\s+/i, `${normalizedPrefix} `)
                        .replace(/^Candidate does not meet the requested\s+/i, `${normalizedPrefix} does not meet the requested `)
                );
            };

            const formatHardFilterMessage = (item) => {
                const code = String(item?.reason_code || '').trim();
                const message = String(item?.message || '').trim();
                const actualValue = item?.actual_value || {};
                if (!message) return '';

                if (code === 'PASSPORT_VALID') {
                    return ensureSentence(
                        stripRequestedFilterSuffix(message)
                            .replace(/^Passport is valid/i, 'Passport valid')
                    );
                }

                if (code === 'PASSPORT_VALIDITY_WINDOW_TOO_SHORT') {
                    return ensureSentence(
                        stripRequestedFilterSuffix(message)
                            .replace(/^Passport is valid/i, 'Passport valid')
                            .replace(/\s+remaining for requested filter\s+'[^']+'\.*$/i, ' remaining')
                    );
                }

                if (code === 'PASSPORT_MISSING') {
                    return 'Passport evidence could not be confirmed.';
                }

                if (code === 'VESSEL_TONNAGE_MATCH') {
                    const matchedEvidence = Array.isArray(actualValue?.matched_evidence) ? actualValue.matched_evidence : [];
                    const best = matchedEvidence[0];
                    if (best && typeof best.value === 'number') {
                        return `Tonnage matches requested range: ${formatTonnageValueForDisplay(best.value, best.unit)}.`;
                    }
                    return ensureSentence(
                        message.replace(/^Candidate vessel tonnage evidence includes\s+/i, 'Tonnage matches requested range: ')
                    );
                }

                if (code === 'VESSEL_TONNAGE_BELOW_MINIMUM') {
                    return ensureSentence(
                        message.replace(/^Highest vessel tonnage found is\s+/i, 'Tonnage below minimum: highest evidence is ')
                    );
                }

                if (code === 'VESSEL_TONNAGE_ABOVE_MAXIMUM') {
                    return ensureSentence(
                        message.replace(/^Lowest vessel tonnage found is\s+/i, 'Tonnage above maximum: lowest evidence is ')
                    );
                }

                if (code === 'VESSEL_TONNAGE_OUT_OF_RANGE') {
                    return 'Tonnage does not fall within the requested range.';
                }

                if (code === 'EXPERIENCE_SHIP_TYPE_MATCH') {
                    return formatShipTypeMatchMessage(message, 'Experienced ship type');
                }

                if (code === 'APPLIED_SHIP_TYPE_MATCH') {
                    return formatShipTypeMatchMessage(message, 'Applied ship type');
                }

                return ensureSentence(message);
            };

            const formatEngineFamilyLabel = (value, { rawMention = '', configuredEngineFamilies = [] } = {}) => {
                const key = normalizeFamilyOptionKey(value);
                if (!key) return String(rawMention || '').trim() || '';
                const configuredOption = configuredEngineFamilies.find(
                    option => normalizeFamilyOptionKey(familyOptionValue(option)) === key
                );
                return familyOptionLabel(configuredOption) || String(rawMention || '').trim() || String(value || '').replace(/_/g, ' ');
            };

            const buildRecruiterCheckLines = (match) => {
                const insights = match?.default_insights || {};
                const lines = [];
                if (typeof insights.current_rank_months_total === 'number') {
                    lines.push(`Months in current rank: ${insights.current_rank_months_total}`);
                }
                if (typeof insights.has_contract_gap_over_6_months === 'boolean') {
                    if (insights.has_contract_gap_over_6_months) {
                        const approxMonths = typeof insights.max_contract_gap_days === 'number'
                            ? Math.max(1, Math.ceil(insights.max_contract_gap_days / 30))
                            : null;
                        const gapTimeline = insights.max_contract_gap_start && insights.max_contract_gap_end
                            ? `${insights.max_contract_gap_start} to ${insights.max_contract_gap_end}`
                            : '';
                        lines.push(
                            approxMonths
                                ? `Gap > 6 months: Yes (${approxMonths} months${gapTimeline ? `, ${gapTimeline}` : ''})`
                                : 'Gap > 6 months: Yes'
                        );
                    } else {
                        lines.push('Gap > 6 months: No');
                    }
                }
                return lines;
            };

            const buildResumeContextLines = (match, options = {}) => {
                const insights = match?.default_insights || {};
                const lines = [];
                if (!options.suppressTonnageSummary) {
                    if (typeof insights.best_vessel_tonnage_value === 'number') {
                        lines.push(
                            `Vessel tonnage evidence: ${formatTonnageValueForDisplay(
                                insights.best_vessel_tonnage_value,
                                insights.best_vessel_tonnage_unit,
                            )}.`
                        );
                    } else if (typeof insights.max_vessel_tonnage === 'number') {
                        const minValue = typeof insights.min_vessel_tonnage === 'number'
                            ? insights.min_vessel_tonnage
                            : insights.max_vessel_tonnage;
                        if (minValue === insights.max_vessel_tonnage) {
                            lines.push(`Vessel tonnage evidence: ${insights.max_vessel_tonnage.toLocaleString()}.`);
                        } else {
                            lines.push(
                                `Vessel tonnage range in resume: ${minValue.toLocaleString()}-${insights.max_vessel_tonnage.toLocaleString()}.`
                            );
                        }
                    }
                }

                const applied = Array.isArray(match?.applied_ship_types) ? match.applied_ship_types.filter(Boolean) : [];
                const experienced = Array.isArray(match?.experienced_ship_types) ? match.experienced_ship_types.filter(Boolean) : [];
                if (applied.length > 0 && !options.suppressAppliedShipTypes) {
                    lines.push(`Applied Ship Type: ${applied.join(', ')}`);
                }
                if (experienced.length > 0 && !options.suppressExperiencedShipTypes) {
                    lines.push(`Experienced Ship Type: ${experienced.join(', ')}`);
                }
                return lines;
            };

            const getHardFilterReasonPresentation = (item) => {
                const message = String(item?.message || '').trim();
                const code = String(item?.reason_code || '').trim();
                if (!message) return null;
                const presenter = HARD_FILTER_REASON_PRESENTERS.find(entry => code.startsWith(entry.prefix));
                if (presenter) {
                    return {
                        group: presenter.group,
                        line: formatHardFilterMessage(item),
                    };
                }
                return {
                    group: 'matchedFilters',
                    line: code ? `${humanizeReasonCode(code)}: ${ensureSentence(message)}` : ensureSentence(message),
                };
            };

            const dedupeDisplayLines = (lines, sharedSeen = null) => {
                const seen = sharedSeen || new Set();
                return lines.filter(line => {
                    const normalized = normalizeReasonDisplayLine(line);
                    if (!normalized || seen.has(normalized)) return false;
                    seen.add(normalized);
                    return true;
                });
            };

            const buildReasonDisplayModel = (rawMatch) => {
                const match = rawMatch?.reason !== undefined
                    ? rawMatch
                    : { ...rawMatch, reason: rawMatch?.ai_match_reason || '' };
                const hardFilterReasonItems = Array.isArray(match?.hard_filter_reasons) ? match.hard_filter_reasons : [];
                const rawHardFilterLines = hardFilterReasonItems
                    .map(item => String(item?.message || '').trim())
                    .filter(Boolean);
                const presentedHardFilterLines = hardFilterReasonItems
                    .map(getHardFilterReasonPresentation)
                    .filter(Boolean);
                const hardFilterLineKeys = new Set([
                    ...rawHardFilterLines.map(normalizeReasonDisplayLine),
                    ...presentedHardFilterLines.map(entry => normalizeReasonDisplayLine(entry.line)),
                ]);
                const primaryReasonLines = splitReasonIntoDisplayLines(match?.reason).filter(line => {
                    const normalized = normalizeReasonDisplayLine(line);
                    return normalized && !hardFilterLineKeys.has(normalized);
                });
                const recruiterCheckLines = buildRecruiterCheckLines(match);
                const contextLines = buildResumeContextLines(match);
                const seen = new Set();
                const matchedFilterLines = dedupeDisplayLines(
                    presentedHardFilterLines
                        .filter(entry => entry.group === 'matchedFilters')
                        .map(entry => entry.line),
                    seen,
                );
                return {
                    primary: dedupeDisplayLines(primaryReasonLines, seen),
                    matchedFilters: matchedFilterLines,
                    recruiterChecks: dedupeDisplayLines(recruiterCheckLines, seen),
                    context: dedupeDisplayLines(contextLines, seen),
                };
            };

            const buildReasonDisplaySummary = (rawMatch) => {
                const formatted = buildReasonDisplayModel(rawMatch);
                return [
                    ...formatted.primary,
                    ...formatted.matchedFilters,
                    ...formatted.recruiterChecks,
                    ...formatted.context,

                if (eventType === 'started') {
                    return {
                        type: 'started',
                        message: event.message || 'Download stream started.',
                        log_file: event.log_file || eventData.log_file || '',
                    };
                }
                if (eventType === 'log') {

                        type: 'log',
                        line: event.line || event.message || '',

                        type: 'progress',
                        stage: progressData.stage || eventType,
                        message: event.message || progressData.message || '',
                        percent: progressData.percent,
                        data: progressData,
                    };

                if (eventType === 'complete') {
                    const result = eventData.result && typeof eventData.result === 'object'
                        ? eventData.result
                        : (event.result && typeof event.result === 'object' ? event.result : eventData);
                    if (result && result.success === false) {
                        return {

                            message: result.message || event.message || 'Download failed.',
                        };

                        log_file: result.log_file || event.log_file || '',

                        body: JSON.stringify({ username: loginUsername.trim(), password: loginPassword })

                return {

                const pending = Number(health.sync?.pending ?? 0);
                const enabled = Boolean(runtimeConfig?.feature_flags?.use_local_agent);
                const reachable = Boolean(agent.reachable);
                const uploadStatus = String(lastResumeUpload?.upload_status || '').trim().toLowerCase();

                if (!enabled) {
                    return {
                        label: 'Local only',

                        detail: 'Cloud-only mode is active, so local sync is disabled.',

                if (!reachable) {

                        detail: localAgentSummary.waitingToStart

                if (pending > 0) {

                const length = 16;
                const bytes = new Uint32Array(length);
                if (window.crypto && window.crypto.getRandomValues) {
                    window.crypto.getRandomValues(bytes);
                } else {
                    for (let i = 0; i < length; i++) {
                        bytes[i] = Math.floor(Math.random() * 1_000_000);
                    }
                }
                let generated = '';
                for (let i = 0; i < length; i++) {
                    generated += chars[bytes[i] % chars.length];

                            method: 'POST',

                            body: JSON.stringify({
                                rank: selectedRank,

                                force_redownload: Boolean(forceRedownload),
                            }),
                        });

                            throw new Error(data.message || 'Failed to start local agent job.');
                        }
                        const jobId = String(data.job_id || '').trim();

                        const normalized = normalizeDownloadStreamEvent(data);
