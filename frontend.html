                                                        <td className="px-4 py-3 whitespace-nowrap">
                                                            {row.country}
                                                        </td>
                                                        <td className="px-4 py-3 whitespace-nowrap text-gray-600">
                                                            {row.mobile_no}
                                                        </td>
                                                        <td className="px-4 py-3">
                                                            <div className="truncate-reason" title={buildReasonDisplaySummary(row)}>
                                                                {buildReasonDisplaySummary(row) || '-'}
                                                            </div>
                                                        </td>
                                                        <td className="px-4 py-3 whitespace-nowrap">
                                                            <div className="flex flex-col gap-2">
                                                                <select
                                                                    value={getPendingStatus(row.candidate_id, row.status || 'New')}
                                                                    onChange={(e) => setPendingStatus(row.candidate_id, e.target.value)}
                                                                    className="p-1 border border-gray-300 rounded text-sm"
                                                                >
                                                                    {STATUS_OPTIONS.map(status => (
                                                                        <option key={status} value={status}>{status}</option>
                                                                    ))}
                                                                </select>

                                                                    onClick={() => handleDashboardStatusUpdate(row.candidate_id, row.status || 'New')}

                                                                    Update
                                                                </button>
                                                            </div>
                                                        </td>
                                                        <td className="px-4 py-3">
                                                            <div className="text-xs text-gray-600 mb-1 truncate-reason" title={row.notes || ''}>
                                                                {row.notes || 'No notes'}

                                                        </td>
                                                        <td className="px-4 py-3 whitespace-nowrap">
                                                            <div className="flex flex-col space-y-2">
                                                                <button
                                                                    onClick={() => openDashboardDrawer(row.candidate_id)}
                                                                    className="bg-blue-600 text-white text-xs px-2 py-1 rounded hover:bg-blue-700"
                                                                    aria-label={`Open details for candidate ${row.candidate_id}`}

                                                                    Details
                                                                </button>
                                                                <button
                                                                    onClick={() => handleOpenHistory(row.candidate_id)}
                                                                    className="bg-gray-600 text-white text-xs px-2 py-1 rounded hover:bg-gray-700"
                                                                >
                                                                    View History
                                                                </button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                    <div className="mt-4 flex items-center justify-between">
                                        <div className="text-sm text-gray-600">

                                        </div>
                                        <div className="flex space-x-2">
                                            <button
                                                onClick={() => setCurrentPage(prev => Math.max(1, prev - 1))}
                                                disabled={currentPage === 1}
                                                className="px-3 py-1 border border-gray-300 rounded disabled:opacity-50 hover:bg-gray-100"

                                                Previous
                                            </button>
                                            {[...Array(Math.min(5, totalPages))].map((_, idx) => {
                                                let pageNum;
                                                if (totalPages <= 5) {
                                                    pageNum = idx + 1;
                                                } else if (currentPage <= 3) {
                                                    pageNum = idx + 1;
                                                } else if (currentPage >= totalPages - 2) {
                                                    pageNum = totalPages - 4 + idx;
                                                } else {
                                                    pageNum = currentPage - 2 + idx;
                                                }
                                                
                                                return (
                                                    <button
                                                        key={idx}
                                                        onClick={() => setCurrentPage(pageNum)}
                                                        className={`px-3 py-1 border rounded ${currentPage === pageNum ? 'bg-blue-600 text-white border-blue-600' : 'border-gray-300 hover:bg-gray-100'}`}
                                                    >

                                                <div className="bg-green-50 border border-green-200 rounded-lg p-4">
                                                    <p className="text-xs uppercase tracking-wide text-green-700">Passed Hard Filters</p>
                                                    <p className="text-2xl font-semibold text-green-900">{analysisResults.hard_filter_summary?.passed ?? 0}</p>
                                                </div>
                                                <div className="bg-amber-50 border border-amber-200 rounded-lg p-4">
                                                    <p className="text-xs uppercase tracking-wide text-amber-700">Needs Review</p>
                                                    <p className="text-2xl font-semibold text-amber-900">{analysisResults.hard_filter_summary?.unknown ?? 0}</p>
                                                </div>
                                                <div className="bg-blue-50 border border-blue-200 rounded-lg p-4">
                                                    <p className="text-xs uppercase tracking-wide text-blue-700">Matched</p>
                                                    <p className="text-2xl font-semibold text-blue-900">{analysisResults.hard_filter_summary?.matched ?? 0}</p>
                                                </div>
                                            </div>

                                            <div>
                                                <div className="flex justify-between items-center mb-4">
                                                    <h3 className="text-xl font-semibold">
                                                        ✓ Verified Matches ({analysisResults.verified_matches.length})
                                                    </h3>
                                                    {analysisResults.verified_matches.length > 0 && (
                                                        <button 
                                                            onClick={handleVerifyResumes} 
                                                            disabled={isVerifyingResumes || selectedFiles.size === 0}
                                                            className={`font-bold py-2 px-4 rounded-lg transition flex items-center space-x-2 ${
                                                                verifyStatus === 'completed' 
                                                                    ? 'bg-green-600 hover:bg-green-700' 
                                                                    : 'bg-blue-600 hover:bg-blue-700'
                                                            } text-white disabled:bg-gray-400`}
                                                        >
                                                            {verifyStatus === 'processing' && (
                                                                <>
                                                                    <svg className="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                                                        <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                                                        <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                                                    </svg>
                                                                    <span>Processing...</span>
                                                                </>
                                                            )}
                                                            
                                                            {verifyStatus === 'completed' && (
                                                                <>
                                                                    <svg className="h-5 w-5 text-white animate-scale-in" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7" />
                                                                    </svg>
                                                                    <span>Completed!</span>
                                                                </>
                                                            )}
                                                            
                                                            {verifyStatus === 'idle' && (
                                                                <span>Move {selectedFiles.size} Selected</span>
                                                            )}
                                                        </button>
                                                    )}
                                                </div>
                                                <div className="bg-gray-50 border border-gray-200 rounded-lg max-h-96 overflow-y-auto">
                                                    {analysisResults.verified_matches.length > 0 ? (
                                                        <table className="min-w-full divide-y divide-gray-200">
                                                            <thead className="bg-gray-100 sticky top-0">
                                                                <tr>
                                                                    <th className="px-4 py-3 text-left">
                                                                        <input type="checkbox" onChange={handleSelectAll} 
                                                                               aria-label="Select all verified matches"
                                                                               checked={selectedFiles.size > 0 && selectedFiles.size === analysisResults.verified_matches.length}/>
                                                                    </th>
                                                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Filename</th>
                                                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Confidence</th>
                                                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Reason</th>
                                                                </tr>
                                                            </thead>
                                                            <tbody className="bg-white divide-y divide-gray-200">
                                                                {analysisResults.verified_matches.map((match, i) => (
                                                                    <tr key={i} className={selectedFiles.has(match.filename) ? 'bg-blue-50' : ''}>
                                                                        <td className="px-4 py-4">
                                                                            <input type="checkbox" checked={selectedFiles.has(match.filename)}
                                                                                   aria-label={`Select resume ${match.filename}`}
                                                                                   onChange={() => handleFileSelection(match.filename)}/>
                                                                        </td>
                                                                        <td className="px-6 py-4 text-sm font-medium text-blue-600 hover:underline">
                                                                            <a href={buildDownloadedResumePreviewUrl(selectedRankFolder, match.filename)}
                                                                               target="_blank" rel="noopener noreferrer">
                                                                                {match.filename}
                                                                            </a>
                                                                        </td>
                                                                        <td className="px-6 py-4 text-sm">{getConfidenceBadge(match.confidence)}</td>
                                                                        <td className="px-6 py-4 text-sm text-gray-500">
                                                                            {renderFormattedReasonBlock(match)}
                                                                            {match.lineage_warning_codes?.includes('EARLIER_CONDITIONS_NOT_RECERTIFIED') && (
                                                                                <p className="mt-2 rounded border border-amber-200 bg-amber-50 px-2 py-1 text-xs font-medium text-amber-800">
                                                                                    Earlier conditions were not re-certified against this changed resume.
                                                                                </p>
                                                                            )}
                                                                            {match.review_path_type && match.review_path_type !== 'none' && (
                                                                                <div className="mt-2 flex flex-wrap gap-2">
                                                                                    <span className={`px-2 py-1 text-xs font-medium rounded-full ${getReviewPathBadgeClass(match.review_path_type)}`}>
                                                                                        {getReviewPathLabel(match.review_path_type)}
                                                                                    </span>
                                                                                </div>
                                                                            )}
                                                                        </td>
                                                                    </tr>
                                                                ))}
                                                            </tbody>
                                                        </table>
                                                    ) : <p className="text-center text-gray-500 p-4">No verified matches found.</p>}
                                                </div>
                                            </div>

                                            {analysisResults.unknown_matches && analysisResults.unknown_matches.length > 0 && (
                                                <div>
                                                    <div className="flex items-center justify-between gap-4 mb-4">
                                                        <h3 className="text-xl font-semibold text-slate-700">
                                                            ? Needs Review ({analysisResults.unknown_matches.length})
                                                        </h3>
                                                        <button
                                                            type="button"
                                                            onClick={() => setIsNeedsReviewCollapsed(prev => !prev)}
                                                            className="px-3 py-1.5 text-sm font-medium text-slate-700 bg-slate-100 border border-slate-200 rounded hover:bg-slate-200"
                                                        >
                                                            {isNeedsReviewCollapsed ? 'Expand' : 'Collapse'}
                                                        </button>
                                                    </div>
                                                    {!isNeedsReviewCollapsed && (
                                                        <>
                                                            <p className="text-sm text-gray-600 mb-4">
                                                                These resumes were not sent to AI reasoning because a hard filter could not be evaluated deterministically.
                                                            </p>
                                                            <div className="bg-slate-50 border border-slate-200 rounded-lg p-4 space-y-4">
                                                                {analysisResults.unknown_matches.map((match, i) => (
                                                                    <div key={i} className="bg-white p-4 rounded border border-slate-200">
                                                                        <div className="flex justify-between items-start gap-4">
                                                                            <div className="flex-1">
                                                                                <a href={buildDownloadedResumePreviewUrl(selectedRankFolder, match.filename)}
                                                                                   target="_blank" rel="noopener noreferrer"
                                                                                   className="text-sm font-medium text-blue-600 hover:underline">
                                                                                    {match.filename}
                                                                                </a>
                                                                                <div className="mt-1">{renderFormattedReasonBlock(match)}</div>
                                                                                <div className="mt-2 flex flex-wrap gap-2">
                                                                                    <span className={`px-2 py-1 text-xs font-medium rounded-full ${getReviewPathBadgeClass(match.review_path_type)}`}>
                                                                                        {getReviewPathLabel(match.review_path_type)}
                                                                                    </span>
                                                                                    {match.evidence_review_state && (
                                                                                        <span className="px-2 py-1 text-xs font-medium rounded-full bg-slate-100 text-slate-700 border border-slate-200">
                                                                                            {getEvidenceReviewStateLabel(match.evidence_review_state)}
                                                                                        </span>
                                                                                    )}
                                                                                    {match.document_quality_hint && (
                                                                                        <span className="px-2 py-1 text-xs font-medium rounded-full bg-slate-100 text-slate-700 border border-slate-200">
                                                                                            {formatDocumentQualityHint(match.document_quality_hint)}
                                                                                        </span>
                                                                                    )}
                                                                                </div>
                                                                                {match.evidence_review_reasons && match.evidence_review_reasons.length > 0 && (
                                                                                    <p className="text-xs text-slate-500 mt-2">
                                                                                        Review reasons: {match.evidence_review_reasons.map(formatEvidenceReasonLabel).join(', ')}
                                                                                    </p>
                                                                                )}
                                                                                {match.unknown_reason_types && match.unknown_reason_types.length > 0 && (
                                                                                    <p className="text-xs text-slate-500 mt-2">
                                                                                        Unknown reason: {match.unknown_reason_types.join(', ')}
                                                                                    </p>
                                                                                )}
                                                                                {match.dob && (
                                                                                    <p className="text-xs text-slate-500 mt-2">DOB: {match.dob}</p>
                                                                                )}
                                                                            </div>
                                                                            <span className="px-2 py-1 rounded-full bg-slate-100 text-slate-700 text-xs font-medium">
                                                                                {match.hard_filter_decision}
                                                                            </span>
                                                                        </div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </>
                                                    )}
                                                </div>
                                            )}

                                            {analysisResults.uncertain_matches && analysisResults.uncertain_matches.length > 0 && (
                                                <div>
                                                    <h3 className="text-xl font-semibold text-yellow-700 mb-4">
                                                        ⚠️ Uncertain Matches - Review Required ({analysisResults.uncertain_matches.length})
                                                    </h3>
                                                    <p className="text-sm text-gray-600 mb-4">
                                                        These matches have lower confidence. Please review and provide feedback to help improve future searches.
                                                    </p>
                                                    <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-4 space-y-4">
                                                        {analysisResults.uncertain_matches.map((match, i) => (
                                                            <div key={i} className="bg-white p-4 rounded border border-yellow-200">
                                                                <div className="flex justify-between items-start mb-3">
                                                                    <div className="flex-1">
                                                                        <a href={buildDownloadedResumePreviewUrl(selectedRankFolder, match.filename)}
                                                                           target="_blank" rel="noopener noreferrer"
                                                                           className="text-sm font-medium text-blue-600 hover:underline">
                                                                            {match.filename}
                                                                        </a>
                                                                        <div className="mt-1">{renderFormattedReasonBlock(match)}</div>
                                                                    </div>
                                                                    {getConfidenceBadge(match.confidence)}
                                                                </div>
                                                                
                                                                <div className="space-y-2">
                                                                    <textarea
                                                                        placeholder="Add notes (optional)"
                                                                        value={feedbackNotes[match.filename] || ''}
                                                                        onChange={(e) => setFeedbackNotes({...feedbackNotes, [match.filename]: e.target.value})}
                                                                        className="w-full p-2 text-xs border border-gray-300 rounded"
                                                                        rows="2"
                                                                    />
                                                                    <div className="flex space-x-2">
                                                                        <button
                                                                            onClick={() => handleFeedback(match.filename, 'match', match.reason, match.confidence, 'approve')}
                                                                            className="flex-1 bg-green-600 text-white text-sm py-2 px-3 rounded hover:bg-green-700"
                                                                        >
                                                                            ✓ Approve Match
                                                                        </button>
                                                                        <button
                                                                            onClick={() => handleFeedback(match.filename, 'match', match.reason, match.confidence, 'reject')}
                                                                            className="flex-1 bg-red-600 text-white text-sm py-2 px-3 rounded hover:bg-red-700"
                                                                        >
                                                                            ✗ Reject Match
                                                                        </button>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            )}
                             {activeTab === 'dashboard' && DashboardTabContent()}
                             {activeTab === 'setup' && SetupTabContent()}
                            {activeTab === 'facts_review' && canAccessTab('facts_review') && CandidateFactsReviewTabContent()}
                            {activeTab === 'telemetry' && canAccessTab('telemetry') && TelemetryTabContent()}
                            {activeTab === 'settings' && canAccessTab('settings') && SettingsTabContent()}
                            {activeTab === 'logs' && canAccessTab('logs') && LogsTabContent()}
                        </main>
                        </>
                        )}
                    </div>
                </div>
                <div className="fixed top-4 right-4 z-50 space-y-2 w-full max-w-md" aria-live="polite" aria-atomic="false">
                    {toasts.map((toast) => (
                        <div key={toast.id} role={toast.type === 'error' ? 'alert' : 'status'} className={`rounded-lg shadow-lg border px-4 py-3 flex items-start justify-between gap-3 ${
                            toast.type === 'success'
                                ? 'bg-green-50 border-green-200 text-green-900'
                                : toast.type === 'warning'
                                    ? 'bg-amber-50 border-amber-200 text-amber-900'
                                    : 'bg-red-50 border-red-200 text-red-900'
                        }`}>
                            <p className="text-sm">{toast.text}</p>
                            <button
                                onClick={() => dismissToast(toast.id)}
                                className="text-xs font-semibold opacity-70 hover:opacity-100"
                            >
                                Dismiss
                            </button>
                        </div>
                    ))}
                </div>
                {pendingRefinementConfirmation && (
                    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 p-4">
                        <div className="w-full max-w-2xl rounded-xl bg-white shadow-2xl" role="dialog" aria-modal="true" aria-labelledby="refinement-confirm-title">
                            <div className="border-b border-slate-200 px-6 py-4">
                                <h3 id="refinement-confirm-title" className="text-lg font-semibold text-slate-900">Refine current verified matches?</h3>
                                <p className="mt-1 text-sm text-slate-600">
                                    This prompt will search only within the current {pendingRefinementConfirmation.preflight.scope_summary?.resolved_count || 0} verified match{Number(pendingRefinementConfirmation.preflight.scope_summary?.resolved_count || 0) === 1 ? '' : 'es'}. Candidates excluded by previous searches will not be considered.
                                </p>
                            </div>
                            <div className="space-y-4 px-6 py-5">
                                <div className="rounded-lg bg-slate-50 p-3 text-sm text-slate-700">
                                    <p><span className="font-medium">New prompt:</span> {pendingRefinementConfirmation.prompt}</p>
                                    <p className="mt-1"><span className="font-medium">Rank:</span> {pendingRefinementConfirmation.preflight.search_context?.rank_folder || selectedRankFolder}</p>
                                    <p className="mt-1"><span className="font-medium">Applied ship type:</span> {pendingRefinementConfirmation.preflight.search_context?.applied_ship_type || 'Any'}</p>
                                    <p className="mt-1"><span className="font-medium">Experienced ship type:</span> {summarizeExperienceFilter({ filter: pendingRefinementConfirmation.preflight.search_context?.experience_ship_type_filter || {}, familyKey: 'ship_family' })}</p>
                                    <p className="mt-1"><span className="font-medium">Engine experience:</span> {summarizeExperienceFilter({ filter: pendingRefinementConfirmation.preflight.search_context?.engine_experience_filter || {}, familyKey: 'engine_family' })}</p>
                                    <p className="mt-1"><span className="font-medium">Vessel tonnage:</span> {vesselTonnageSummary(pendingRefinementConfirmation.preflight.search_context?.vessel_tonnage_filter || {})}</p>
                                    <p className="mt-1"><span className="font-medium">Next step:</span> Refinement {searchChain.length}</p>
                                </div>
                                {Number(pendingRefinementConfirmation.preflight.scope_summary?.unavailable_percentage || 0) > 30 && (
                                    <div className="rounded-lg border border-amber-200 bg-amber-50 p-3 text-sm text-amber-900">
                                        Some candidates from the previous step are no longer available. This refinement will search {pendingRefinementConfirmation.preflight.scope_summary?.resolved_count || 0} of {pendingRefinementConfirmation.preflight.scope_summary?.requested_count || 0} previous verified matches.
                                    </div>
                                )}
                                {Number(pendingRefinementConfirmation.preflight.scope_summary?.changed_content_count || 0) > 0 && (
                                    <label className="flex items-start gap-3 rounded-lg border border-amber-300 bg-amber-50 p-3 text-sm text-amber-900">
                                        <input
                                            type="checkbox"
                                            className="mt-1 h-4 w-4"
                                            checked={changedContentAcknowledged}
                                            onChange={e => setChangedContentAcknowledged(e.target.checked)}
                                        />
                                        <span>
                                            Some candidate resumes changed after an earlier search step. Earlier conditions have not been re-certified against the changed content. Continue using the current resumes?
                                        </span>
                                    </label>
                                )}
                            </div>
                            <div className="flex justify-end gap-3 border-t border-slate-200 px-6 py-4">
                                <button
                                    type="button"
                                    ref={refinementCancelButtonRef}
                                    onClick={() => { setPendingRefinementConfirmation(null); setChangedContentAcknowledged(false); }}
                                    disabled={isRefinementConfirming}
                                    className="rounded-md border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50"
                                >
                                    Cancel
                                </button>
                                <button
                                    type="button"
                                    onClick={handleConfirmRefinement}
                                    disabled={
                                        isRefinementConfirming
                                        || (Boolean(pendingRefinementConfirmation.preflight.scope_summary?.changed_content_set_fingerprint) && !changedContentAcknowledged)
                                    }
                                    className="rounded-md bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700 disabled:bg-slate-400"
                                >
                                    {isRefinementConfirming
                                        ? 'Confirming...'
                                        : <>Refine {pendingRefinementConfirmation.preflight.scope_summary?.resolved_count || 0} Match{Number(pendingRefinementConfirmation.preflight.scope_summary?.resolved_count || 0) === 1 ? '' : 'es'}</>}
                                </button>
                            </div>
                        </div>
                    </div>
                )}
                {historyModal.open && (
                    <div className="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-lg shadow-xl w-full max-w-4xl max-h-[80vh] overflow-hidden" role="dialog" aria-modal="true" aria-label={`Candidate history for ${historyModal.candidateId}`}>
                            <div className="flex items-center justify-between px-6 py-4 border-b">
                                <h3 className="text-lg font-semibold">Candidate History: {historyModal.candidateId}</h3>
                                <button
                                    onClick={() => setHistoryModal({ open: false, candidateId: '', rows: [] })}
                                    className="text-gray-500 hover:text-gray-700"
                                >
                                    Close
                                </button>
                            </div>
                            <div className="overflow-y-auto max-h-[65vh] p-4">
                                {historyModal.rows.length === 0 ? (
                                    <p className="text-sm text-gray-600">No history found.</p>
                                ) : (
                                    <table className="min-w-full divide-y divide-gray-200">
                                        <thead className="bg-gray-100">
                                            <tr>
                                                <th className="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase">Date</th>
                                                <th className="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase">Event</th>
                                                <th className="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                                                <th className="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase">Notes</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-200">
                                            {historyModal.rows.map((item, idx) => (
                                                <tr key={idx}>
                                                    <td className="px-3 py-2 text-sm text-gray-600">{formatDate(item.Date_Added)}</td>
                                                    <td className="px-3 py-2 text-sm">{item.Event_Type || ''}</td>
                                                    <td className="px-3 py-2 text-sm">{item.Status || ''}</td>
                                                    <td className="px-3 py-2 text-sm text-gray-600">{item.Notes || ''}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                )}
                            </div>
                        </div>
                    </div>
                )}
                {downloadFolderBrowser.open && (
                    <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-xl shadow-2xl w-full max-w-7xl h-[85vh] overflow-hidden flex flex-col" role="dialog" aria-modal="true" aria-label={`Downloaded resumes in ${downloadFolderBrowser.rankFolder}`}>
                            <div className="flex items-center justify-between px-6 py-4 border-b border-slate-200">
                                <div>
                                    <h3 className="text-lg font-semibold text-slate-900">Downloaded Resumes</h3>
                                    <p className="text-sm text-slate-600">{downloadFolderBrowser.rankFolder}</p>
                                </div>
                                <button
                                    onClick={closeDownloadFolderBrowser}
                                    className="text-gray-500 hover:text-gray-700"
                                >
                                    Close
                                </button>
                            </div>
                            <div className="flex-1 min-h-0 grid grid-cols-1 md:grid-cols-[320px_minmax(0,1fr)]">
                                <div className="border-r border-slate-200 bg-slate-50 p-4 overflow-y-auto">
                                    {downloadFolderBrowser.loading ? (
                                        <p className="text-sm text-slate-600">Loading downloaded resumes...</p>
                                    ) : downloadFolderBrowser.files.length === 0 ? (
                                        <p className="text-sm text-slate-500">No PDFs found in this folder.</p>
                                    ) : (
                                        <div className="space-y-2">
                                            {downloadFolderBrowser.files.map((file) => (
                                                <button
                                                    key={file}
                                                    type="button"
                                                    onClick={() => setDownloadFolderBrowser(prev => ({ ...prev, selectedFile: file }))}
                                                    className={`w-full text-left rounded-lg border px-3 py-2 text-sm break-all ${
                                                        downloadFolderBrowser.selectedFile === file
                                                            ? 'border-blue-300 bg-blue-50 text-blue-700'
                                                            : 'border-slate-200 bg-white text-slate-700 hover:bg-slate-100'
                                                    }`}
                                                >
                                                    {file}
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                <div className="bg-slate-100 h-full flex flex-col min-h-0">
                                    {downloadFolderBrowser.selectedFile ? (
                                        <>
                                            <div className="flex items-center justify-between gap-4 px-4 py-3 border-b border-slate-200 bg-white">
                                                <div className="min-w-0">
                                                    <p className="text-sm font-semibold text-slate-900 truncate">{downloadFolderBrowser.selectedFile}</p>
                                                    <p className="text-xs text-slate-500">Adds the resume to the existing verified/dashboard event log without moving the source file.</p>
                                                </div>
                                                <button
                                                    type="button"
                                                    onClick={handleVerifyDownloadedResume}
                                                    disabled={isDownloadBrowserVerifying}
                                                    className="shrink-0 rounded-md bg-green-600 px-4 py-2 text-sm font-medium text-white hover:bg-green-700 disabled:cursor-not-allowed disabled:opacity-60"
                                                >
                                                    {isDownloadBrowserVerifying ? 'Verifying...' : 'Verify Resume'}
                                                </button>
                                            </div>
                                            <iframe
                                                title={`Preview ${downloadFolderBrowser.selectedFile}`}
                                                src={buildDownloadedResumePreviewUrl(downloadFolderBrowser.rankFolder, downloadFolderBrowser.selectedFile)}
                                                className="w-full flex-1 min-h-0"
                                            />
                                        </>
                                    ) : (
                                        <div className="h-full flex items-center justify-center text-sm text-slate-500">
                                            Select a downloaded resume to preview it.
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                )}
                </>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
