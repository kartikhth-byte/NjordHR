                            return;
                        }

                        if (normalized.type === 'started') {
                            if (normalized.log_file) {
                                setLogFile(normalized.log_file);
                            }
                            return;
                        }

                        if (normalized.type === 'log') {
                            setDownloadLog(prev => [...prev, normalized.line]);
                            return;
                        }

                        if (normalized.type === 'error') {
                            handleSendMessage('error', normalized.message || 'Download failed.');
                            setDownloadLog(prev => [...prev, `ERROR: ${normalized.message || 'Download failed.'}`]);
                            setIsDownloadLoading(false);
                            setIsDownloadInProgress(false);
                            stream.close();
                            downloadEventSourceRef.current = null;
                            return;
                        }

                        if (normalized.type === 'progress') {
                            if (normalized.message) {
                                setDownloadLog(prev => [...prev, normalized.message]);
                            }
                            return;
                        }

                        if (normalized.type === 'complete') {
                            if (normalized.log_file) {
                                setLogFile(normalized.log_file);
                            }
                            if (normalized.success) {
                                handleSendMessage('success', normalized.message || 'Download finished.');
                                setDownloadCompleted(true);
                                fetchRankFolders();
                                fetchDownloadFolderSummaries();
                                fetchDownloadResultsSummary();
                            } else {
                                handleSendMessage('error', normalized.message || 'Download failed.');
                            }
                            setIsDownloadLoading(false);
                            setIsDownloadInProgress(false);
                            stream.close();
                            downloadEventSourceRef.current = null;
                        }
                    };

                    stream.onerror = () => {
                        stream.close();
                        downloadEventSourceRef.current = null;
                        resetDownloadActivityState();
                        fetch(getSessionHealthUrl())
                            .then(response => response.json())
                            .then(data => {
                                if (data.success && data.health && !data.health.valid) {
                                    const reason = data.message || data.health.reason || 'Session disconnected during download.';
                                    applySessionDisconnected(
                                        `${reason} Request a new OTP to reconnect.`,
                                        {
                                            preservePhone: true,
                                            clearOtpState: true,
                                            surfaceAsError: true,
                                            idleSeconds: data.idle_seconds,
                                            idleTimeoutSeconds: data.idle_timeout_seconds,
                                        }
                                    );
                                    setDownloadLog(prev => [...prev, `ERROR: ${reason}`]);
                                    return;
                                }
                                handleSendMessage('error', 'Download stream disconnected. You can reconnect and retry.');
                                setDownloadLog(prev => [...prev, 'ERROR: Download stream disconnected.']);
                            })
                            .catch(() => {
                                handleSendMessage('error', 'Download stream disconnected. You can reconnect and retry.');
                                setDownloadLog(prev => [...prev, 'ERROR: Download stream disconnected.']);
                            });
                    };
                } catch (error) {
                    handleSendMessage('error', 'Failed to connect to backend server.');
                    setDownloadLog(prev => [...prev, 'Error: Could not connect to the backend.']);
                    setIsDownloadLoading(false);
                    setIsDownloadInProgress(false);
                }
            };

            const handleFetchOutlookResumes = async () => {
                setIsDownloadLoading(true);
                setIsDownloadInProgress(true);
                setDownloadCompleted(false);
                setDownloadLog(['Starting Outlook fetch...']);
                setLogFile(null);
                try {
                    if (downloadEventSourceRef.current) {
                        downloadEventSourceRef.current.close();
                    }

                    const stream = new EventSource(`${API_BASE_URL}/outlook_fetch_stream`);
                    downloadEventSourceRef.current = stream;

                    stream.onmessage = (event) => {
                        let data = {};
                        try {
                            data = JSON.parse(event.data);
                        } catch {
                            return;
                        }

                        if (data.type === 'started') {
                            return;
                        }

                        if (data.type === 'log') {
                            setDownloadLog(prev => [...prev, data.line]);
                            return;
                        }

                        if (data.type === 'error') {
                            handleSendMessage('error', data.message || 'Outlook fetch failed.');
                            setDownloadLog(prev => [...prev, `ERROR: ${data.message || 'Outlook fetch failed.'}`]);
                            resetDownloadActivityState();
                            fetchRuntimeConfig(true);
                            stream.close();
                            downloadEventSourceRef.current = null;
                            return;
                        }

                        if (data.type === 'complete') {
                            if (data.success) {
                                handleSendMessage('success', data.message || 'Outlook fetch finished.');
                                setDownloadCompleted(true);
                                fetchRankFolders();
                                fetchDownloadFolderSummaries();
                                fetchDownloadResultsSummary();
                                fetchRuntimeConfig(true);
                            } else {
                                handleSendMessage('error', data.message || 'Outlook fetch failed.');
                                fetchRuntimeConfig(true);
                            }
                            resetDownloadActivityState();
                            stream.close();
                            downloadEventSourceRef.current = null;
                        }
                    };

                    stream.onerror = () => {
                        stream.close();
                        downloadEventSourceRef.current = null;
                        resetDownloadActivityState();
                        handleSendMessage('error', 'Outlook fetch stream disconnected.');
                        setDownloadLog(prev => [...prev, 'ERROR: Outlook fetch stream disconnected.']);
                        fetchRuntimeConfig(true);
                    };
                } catch (error) {
                    handleSendMessage('error', 'Failed to connect to backend server.');
                    setDownloadLog(prev => [...prev, 'ERROR: Could not connect to the backend.']);
                    resetDownloadActivityState();
                }
            };

            const handleConnectMailbox = async (mode = 'connect') => {
                setMailboxAuthAction(mode);
                const authWindow = window.open('about:blank', '_blank');
                if (!authWindow) {
                    handleSendMessage('error', 'Allow pop-ups for this app, then use Connect Mailbox again.');
                    setMailboxAuthAction('');
                    return;
                }
                authWindow.document.title = 'NjordHR Mailbox Sign-in';
                authWindow.document.body.innerHTML = '<p style="font-family: system-ui, sans-serif; margin: 24px;">Preparing Microsoft sign-in...</p>';
                try {
                    const response = await fetch(`${API_BASE_URL}/email-intake/auth/start`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ open_browser: false }),
                    });
                    const data = await response.json();
                    if (!data.success) {
                        const message = /outlook_client_id is required/i.test(data.message || '')
                            ? 'Outlook Client ID is missing. Add it in Settings > Operational Settings > Mailbox Intake, save settings, then connect the mailbox.'
                            : (data.message || 'Failed to start mailbox connection.');
                        handleSendMessage('error', message);
                        authWindow.close();
                        return;
                    }
                    if (data.auth_url) {
                        authWindow.location.href = data.auth_url;
                    } else {
                        authWindow.close();
                    }
                    handleSendMessage('success', data.message || 'Mailbox sign-in started. Complete the Microsoft consent flow, then return here.');
                    setDownloadLog(prev => [...prev, 'Started Outlook mailbox sign-in flow.']);
                    setTimeout(() => fetchRuntimeConfig(true), 1500);
                } catch (_error) {
                    handleSendMessage('error', 'Failed to start mailbox connection.');
                    authWindow.close();
                } finally {
                    setMailboxAuthAction('');
                }
            };

            const handleDisconnectMailbox = async () => {
                setMailboxAuthAction('disconnect');
                try {
                    const response = await fetch(`${API_BASE_URL}/email-intake/auth/disconnect`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                    });
                    const data = await response.json();
                    if (!data.success) {
                        handleSendMessage('error', data.message || 'Failed to disconnect mailbox.');
                        return;
                    }
                    handleSendMessage('success', data.message || 'Mailbox disconnected.');
                    setDownloadLog(prev => [...prev, 'Disconnected Outlook mailbox.']);
                    await fetchRuntimeConfig(true);
                } catch (_error) {
                    handleSendMessage('error', 'Failed to disconnect mailbox.');
                } finally {
                    setMailboxAuthAction('');
                }
            };
            
            const handleDisconnect = async () => {
                setIsDisconnecting(true);
                try {
                    if (downloadEventSourceRef.current) {
                        downloadEventSourceRef.current.close();
                        downloadEventSourceRef.current = null;
                    }
                    const sessionBaseUrl = getSessionBaseUrl();
                    await fetch(
                        `${sessionBaseUrl}${sessionBaseUrl === API_BASE_URL ? '/disconnect_session' : '/session/disconnect'}`,
                        { method: 'POST' }
                    );
                    setSessionConnected(false);
                    setSessionDisconnectNotice('');
                    setSessionHealthInfo({ idleSeconds: 0, idleTimeoutSeconds: 0 });
                    setLoginStep('phone');
                    setPhoneNumber('');
                    setOtp('');
                    setOtpExpiresAt(null);
                    setDownloadLog([]);
                    setLogFile(null);
                    setIsDownloadInProgress(false);
                    setDownloadCompleted(false);
                    handleSendMessage('success', 'Session disconnected.');
                } catch(error) { handleSendMessage('error', 'Failed to disconnect session cleanly.'); }
                setIsDisconnecting(false);
            };
            const newSearchRequestId = () => (
                window.crypto?.randomUUID
                    ? window.crypto.randomUUID()
                    : `search_${Date.now()}_${Math.random().toString(36).slice(2, 12)}`
            );

            const isViewingHistoricalSearchStep = aiSearchState.isViewingHistoricalSearchStep(
                searchChain,
                activeSearchStepIndex,
            );
            const displayedAiPrompt = aiSearchState.displayedAiPrompt({
                searchChain,
                activeSearchStepIndex,
                aiPrompt,
            });
            const latestSearchResults = () => (
                aiSearchState.latestSearchResults(searchChain, analysisResultsRef.current)
            );
            const currentParentSearchSessionId = () => (
                aiSearchState.currentParentSearchSessionId({
                    searchChain,
                    fallbackResults: analysisResultsRef.current,
                    refinementAvailability,
                })
            );

            const fetchRefinementPreflight = async (parentSearchSessionId = currentParentSearchSessionId()) => {
                if (!parentSearchSessionId) {
                    throw new Error('The previous verified search scope is not available.');
                }
                const response = await fetch(
                    `${API_BASE_URL}/ai_search/refinement_scope/${encodeURIComponent(parentSearchSessionId)}/preflight`
                );
                const data = await response.json().catch(() => ({}));
                if (!response.ok || !data.success) {
                    const error = new Error(data.message || 'The previous verified search scope is not available.');
                    error.code = data.error_code || 'REFINEMENT_SCOPE_UNAVAILABLE';
                    error.retryable = Boolean(data.retryable);
                    throw error;
                }
                setRefinementPreflight(data);
                return data;
            };

            const handleRefinementToggle = async (enabled) => {
                if (!enabled) {
                    setRefinementMode(false);
                    setRefinementState(analysisResults ? 'mode_off_with_stale_results' : 'disabled');
                    return;
                }
                try {
                    const preflight = await fetchRefinementPreflight();
                    const resolvedCount = Number(preflight.scope_summary?.resolved_count || 0);
                    setRefinementMode(true);
                    setRefinementState(resolvedCount > 0 ? 'active_idle' : 'disabled');
                    setRefinementAvailability(prev => ({
                        ...prev,
                        available: resolvedCount > 0,
                        candidateCount: resolvedCount,
                        reason: resolvedCount > 0 ? '' : 'No previous verified candidates are currently available.',
                    }));
                } catch (error) {
                    setRefinementMode(false);
                    setRefinementState(error.retryable ? 'available' : 'disabled');
                    setRefinementAvailability(prev => ({
                        ...prev,
                        available: Boolean(error.retryable),
                        reason: error.message,
                    }));
                    handleSendMessage(error.retryable ? 'warning' : 'error', error.message);
                }
            };

            const invalidateRefinementForFilterChange = () => {
                if (!aiSearchState.shouldInvalidateRefinementForFilterChange({
                    analysisResults: analysisResultsRef.current,
                    refinementMode,
                })) return;
                setRefinementState('invalidated_by_filter_change');
                setRefinementAvailability(aiSearchState.invalidatedRefinementAvailability());
            };

            const normalizeTonnageInput = (value) => {
                const text = String(value || '').trim();
                if (!text) return null;
                if (!/^\d+$/.test(text)) return NaN;
                const parsed = Number.parseInt(text, 10);
                return Number.isSafeInteger(parsed) && parsed > 0 ? parsed : NaN;
            };

            const createExperienceFilterRow = (overrides = {}) => ({
                ...DEFAULT_EXPERIENCE_FILTER_ROW,
                ...overrides,
            });

            const familyOptionValue = (option) => (
                option && typeof option === 'object'
                    ? String(option.value || '')
                    : String(option || '')
            );

            const familyOptionLabel = (option) => (
                option && typeof option === 'object'
                    ? String(option.label || option.value || '')
                    : String(option || '')
            );

            const normalizeFamilyOptionKey = (value) => String(value || '')
                .trim()
                .toLowerCase()
                .replace(/-/g, '_')
                .replace(/\s+/g, '_');

            const reconcileFamilyOptionValue = (value, options) => {
                const requestedKey = normalizeFamilyOptionKey(value);
                if (!requestedKey) return '';
                const candidates = Array.isArray(options) ? options : [];
                const resolved = candidates.find(option => normalizeFamilyOptionKey(familyOptionValue(option)) === requestedKey);
                return resolved ? familyOptionValue(resolved) : '';
            };

            const normalizePositiveIntegerInput = (value) => {
                const text = String(value || '').trim();
                if (!text) return null;
                if (!/^\d+$/.test(text)) return NaN;
                const parsed = Number.parseInt(text, 10);
                return Number.isSafeInteger(parsed) && parsed > 0 ? parsed : NaN;
            };

            const buildExperienceFilterFromRows = ({ rows, familyKey, type }) => {
                const normalizedItems = [];
                for (const row of Array.isArray(rows) ? rows : []) {
                    const family = String(row?.family || '').trim();
                    if (!family) continue;
                    const minimumMonths = normalizePositiveIntegerInput(row?.minimum_months);
                    const yearsBack = row?.recency_mode === 'years_back'
                        ? normalizePositiveIntegerInput(row?.years_back)
                        : null;
                    const contractCount = row?.recency_mode === 'contract_count'
                        ? normalizePositiveIntegerInput(row?.contract_count)
                        : null;
                    if (
                        Number.isNaN(minimumMonths)
                        || Number.isNaN(yearsBack)
                        || Number.isNaN(contractCount)
                        || (row?.recency_mode === 'years_back' && yearsBack === null)
                        || (row?.recency_mode === 'contract_count' && contractCount === null)
                    ) {
                        return { error: 'Experience filter values must be positive whole numbers.' };
                    }
                    normalizedItems.push({
                        [familyKey]: family,
                        minimum_months: minimumMonths,
                        years_back: yearsBack,
                        contract_count: contractCount,
                    });
                }
                if (!normalizedItems.length) {
                    return { filter: {} };
                }
                return {
                    filter: {
                        type,
                        match_mode: 'any_of',
                        items: normalizedItems,
                    },
                };
            };

            const summarizeExperienceFilter = ({ filter, familyKey }) => {
                const items = Array.isArray(filter?.items) ? filter.items : [];
                if (!items.length) return 'Any';
                return items.map(item => {
                    const rawLabel = String(item?.[familyKey] || '');
                    const label = familyKey === 'engine_family'
                        ? formatEngineFamilyLabel(rawLabel)
                        : rawLabel.replace(/_/g, ' ');
                    const suffix = [];
                    if (item?.minimum_months) suffix.push(`${item.minimum_months}m+`);
                    if (item?.years_back) suffix.push(`${item.years_back}y`);
                    if (item?.contract_count) suffix.push(`${item.contract_count}c`);
                    return [label, suffix.join(' ')].filter(Boolean).join(' ');
                }).join(' | ');
            };

            const buildVesselTonnageFilter = () => {
                const minValue = normalizeTonnageInput(vesselTonnageMin);
                const maxValue = normalizeTonnageInput(vesselTonnageMax);
                const yearsBack = normalizePositiveIntegerInput(vesselTonnageYearsBack);
                if (Number.isNaN(minValue) || Number.isNaN(maxValue)) {
                    return { error: 'Vessel tonnage must be a positive whole number.' };
                }
                if (Number.isNaN(yearsBack)) {
                    return { error: 'Vessel tonnage recency must be a positive whole number.' };
                }
                if (minValue === null && maxValue === null) {
                    return { filter: {} };
                }
                if (minValue !== null && maxValue !== null && minValue > maxValue) {
                    return { error: 'Minimum vessel tonnage cannot be greater than maximum vessel tonnage.' };
                }
                const unit = ['any', 'unspecified', 'gt_grt', 'dwt'].includes(vesselTonnageUnit)
                    ? vesselTonnageUnit
                    : 'any';
                return {
                    filter: {
                        type: 'vessel_tonnage',
                        min_value: minValue,
                        max_value: maxValue,
                        unit,
                        years_back: yearsBack,
                    },
                };
            };

            const vesselTonnageSummary = (filter = {}) => {
                if (!filter || (filter.min_value == null && filter.max_value == null)) return 'Any';
                const unitLabel = {
                    any: 'Any / unspecified',
                    unspecified: 'Unspecified',
                    gt_grt: 'GT/GRT',
                    dwt: 'DWT',
                }[filter.unit || 'any'] || 'Any / unspecified';
                const recency = filter.years_back ? `, last ${filter.years_back} year${filter.years_back === 1 ? '' : 's'}` : '';
                if (filter.min_value != null && filter.max_value != null) {
                    return `${filter.min_value.toLocaleString()}-${filter.max_value.toLocaleString()} (${unitLabel}${recency})`;
                }
                if (filter.min_value != null) return `>= ${filter.min_value.toLocaleString()} (${unitLabel}${recency})`;
                return `<= ${filter.max_value.toLocaleString()} (${unitLabel}${recency})`;
            };

            const appendExperienceFilterRow = (setter) => {
                setter(prev => [...prev, createExperienceFilterRow()]);
                invalidateRefinementForFilterChange();
            };

            const removeExperienceFilterRow = (setter, index) => {
                setter(prev => prev.filter((_, rowIndex) => rowIndex !== index));
                invalidateRefinementForFilterChange();
            };

            const updateExperienceFilterRow = (setter, index, updater) => {
                setter(prev => prev.map((row, rowIndex) => (
                    rowIndex === index ? updater(row) : row
                )));
                invalidateRefinementForFilterChange();
            };

            const renderExperienceFilterRows = ({
                rows,
                setter,
                options,
                familyLabel,
                familyPlaceholder,
                familyInputIdPrefix,
                locked,
                optionLabelFormatter,
            }) => (
                <div className="space-y-3">
                    {rows.map((row, index) => (
                        <div key={`${familyInputIdPrefix}-${index}`} className="rounded-lg border border-slate-200 bg-slate-50 p-3">
                            <div className="grid grid-cols-1 gap-3 md:grid-cols-12">
                                <div className="md:col-span-4">
                                    <label htmlFor={`${familyInputIdPrefix}-family-${index}`} className="block text-xs font-medium text-gray-600">{familyLabel}</label>
                                    <select
                                        id={`${familyInputIdPrefix}-family-${index}`}
                                        value={row.family}
                                        onChange={e => updateExperienceFilterRow(setter, index, current => ({ ...current, family: e.target.value }))}
                                        className="mt-1 w-full p-2 border border-gray-300 rounded-md shadow-sm disabled:bg-slate-100 disabled:text-slate-700"
                                        disabled={locked}
                                    >
                                        <option value="">{familyPlaceholder}</option>
                                        {options.map(option => (
                                            <option key={familyOptionValue(option)} value={familyOptionValue(option)}>
                                                {optionLabelFormatter ? optionLabelFormatter(familyOptionValue(option), familyOptionLabel(option)) : familyOptionLabel(option)}
                                            </option>
                                        ))}
                                    </select>
                                </div>
                                <div className="md:col-span-3">
                                    <label htmlFor={`${familyInputIdPrefix}-recency-${index}`} className="block text-xs font-medium text-gray-600">Recency</label>
                                    <select
                                        id={`${familyInputIdPrefix}-recency-${index}`}
                                        value={row.recency_mode}
                                        onChange={e => updateExperienceFilterRow(setter, index, current => ({ ...current, recency_mode: e.target.value }))}
                                        className="mt-1 w-full p-2 border border-gray-300 rounded-md shadow-sm disabled:bg-slate-100 disabled:text-slate-700"
                                        disabled={locked}
                                    >
                                        <option value="any_time">Any time</option>
                                        <option value="years_back">Within last N years</option>
                                        <option value="contract_count">Across last N contracts</option>
                                    </select>
                                </div>
                                <div className="md:col-span-2">
                                    <label htmlFor={`${familyInputIdPrefix}-window-${index}`} className="block text-xs font-medium text-gray-600">
                                        {row.recency_mode === 'contract_count' ? 'Contracts' : 'Years'}
                                    </label>
                                    <input
                                        id={`${familyInputIdPrefix}-window-${index}`}
                                        type="number"
                                        inputMode="numeric"
                                        min="1"
                                        step="1"
                                        value={row.recency_mode === 'contract_count' ? row.contract_count : row.years_back}
                                        onChange={e => updateExperienceFilterRow(setter, index, current => (
                                            row.recency_mode === 'contract_count'
                                                ? { ...current, contract_count: e.target.value }
                                                : { ...current, years_back: e.target.value }
                                        ))}
                                        className="mt-1 w-full p-2 border border-gray-300 rounded-md shadow-sm disabled:bg-slate-100 disabled:text-slate-700"
                                        placeholder={row.recency_mode === 'contract_count' ? '3' : '2'}
                                        disabled={locked || row.recency_mode === 'any_time'}
                                    />
                                </div>
                                <div className="md:col-span-2">
                                    <label htmlFor={`${familyInputIdPrefix}-months-${index}`} className="block text-xs font-medium text-gray-600">Min months</label>
                                    <input
                                        id={`${familyInputIdPrefix}-months-${index}`}
                                        type="number"
                                        inputMode="numeric"
                                        min="1"
                                        step="1"
                                        value={row.minimum_months}
                                        onChange={e => updateExperienceFilterRow(setter, index, current => ({ ...current, minimum_months: e.target.value }))}
                                        className="mt-1 w-full p-2 border border-gray-300 rounded-md shadow-sm disabled:bg-slate-100 disabled:text-slate-700"
                                        placeholder="Optional"
                                        disabled={locked}
                                    />
                                </div>
                                <div className="md:col-span-1 flex items-end">
                                    <button
                                        type="button"
                                        onClick={() => removeExperienceFilterRow(setter, index)}
                                        className="w-full rounded-md border border-slate-300 px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 disabled:bg-slate-100 disabled:text-slate-400"
                                        disabled={locked}
                                    >
                                        Remove
                                    </button>
                                </div>
                            </div>
                        </div>
                    ))}
                    <button
                        type="button"
                        onClick={() => appendExperienceFilterRow(setter)}
                        className="rounded-md border border-slate-300 px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 disabled:bg-slate-100 disabled:text-slate-400"
                        disabled={locked}
                    >
                        Add row
                    </button>
                </div>
            );

            const startAnalysis = async ({
                mode = 'root',
                requestId = newSearchRequestId(),
                parentSearchSessionId = '',
                acknowledgementId = '',
                prompt = aiPrompt,
            } = {}) => {
                if (eventSourceRef.current) {
                    eventSourceRef.current.close();
                }
                const isRefinement = mode === 'refinement';
                const priorCompletedSearchSnapshot = aiSearchState.completedSearchSnapshot({
                    prompt: aiPrompt,
                    analysisResults: analysisResultsRef.current,
                    searchChain,
                    activeSearchStepIndex,
                    refinementMode,
                    refinementState,
                    refinementAvailability,
                });
                const restoreCompletedSearchSnapshot = (snapshot) => {
                    if (!snapshot?.analysisResults) return false;
                    setAiPrompt(snapshot.prompt);
                    setAnalysisResults(snapshot.analysisResults);
                    analysisResultsRef.current = snapshot.analysisResults;
                    setSearchChain(snapshot.searchChain);
                    setActiveSearchStepIndex(snapshot.activeSearchStepIndex);
                    setRefinementMode(snapshot.refinementMode);
                    setRefinementState(snapshot.refinementState);
                    setRefinementAvailability(snapshot.refinementAvailability);
                    return true;
                };
                const preserveCompletedResultsAfterFailure = ({ markServiceUnreachable = false } = {}) => {
                    const failureState = aiSearchState.streamFailureRecoveryState({
                        isRefinement,
                        completedSearchSnapshot: priorCompletedSearchSnapshot,
                    });
                    if (failureState.restoreCompletedResults) {
                        restoreCompletedSearchSnapshot(failureState.restoreCompletedResults);
                    } else if (failureState.refinementState) {
                        setRefinementState(failureState.refinementState);
                    }
                    if (markServiceUnreachable) {
                        setServiceRecovery(failureState.serviceRecovery);
                    }
                    return failureState;
                };
                if (!isRefinement) {
                    setAnalysisResults(null);
                    setSearchChain([]);
                    setActiveSearchStepIndex(-1);
                    setRefinementMode(false);
                    setRefinementState('disabled');
                } else {
                    setRefinementState('active_running');
                }
                setPendingRefinementConfirmation(null);
                setChangedContentAcknowledged(false);
                setIsAnalyzeLoading(true);
                setSelectedFiles(new Set());
                setFeedbackNotes({});
                setVerifyStatus('idle');
                setAnalysisProgress({
                    isAnalyzing: true,
                    stage: 'connecting',
                    current: 0,
                    total: isRefinement ? refinementAvailability.candidateCount : 0,
                    message: isRefinement
                        ? `Connecting to refine ${refinementAvailability.candidateCount} previous verified match${refinementAvailability.candidateCount === 1 ? '' : 'es'}...`
                        : 'Connecting...',
                    liveVerified: [],
                    liveUncertain: [],
                    liveUnknown: []
                });

                try {
                    const params = new URLSearchParams({ prompt, search_request_id: requestId });
                    if (isRefinement) {
                        params.set('parent_search_session_id', parentSearchSessionId);
                        if (acknowledgementId) {
                            params.set('changed_content_acknowledgement_id', acknowledgementId);
                        }
                    } else {
                        const selectedId = selectedRankFolderId();
                        const experienceShipTypeResult = buildExperienceFilterFromRows({
                            rows: experienceShipTypeRows,
                            familyKey: 'ship_family',
                            type: 'experience_ship_type',
                        });
                        const engineExperienceResult = buildExperienceFilterFromRows({
                            rows: engineExperienceRows,
                            familyKey: 'engine_family',
                            type: 'engine_experience',
                        });
                        if (experienceShipTypeResult.error || engineExperienceResult.error) {
                            preserveCompletedResultsAfterFailure();
                            setAnalysisProgress(prev => ({ ...prev, isAnalyzing: false }));
                            setIsAnalyzeLoading(false);
                            handleSendMessage('error', experienceShipTypeResult.error || engineExperienceResult.error);
                            return;
                        }
                        if (selectedId) {
                            params.set('rank_folder_id', selectedId);
                        }
                        params.set('rank_folder', selectedRankFolder);
                        params.set('applied_ship_type', selectedSearchShipType);
                        if (experienceShipTypeResult.filter && Array.isArray(experienceShipTypeResult.filter.items) && experienceShipTypeResult.filter.items.length) {
                            params.set('experience_ship_type_filter', JSON.stringify(experienceShipTypeResult.filter));
                        }
                        if (engineExperienceResult.filter && Array.isArray(engineExperienceResult.filter.items) && engineExperienceResult.filter.items.length) {
                            params.set('engine_experience_filter', JSON.stringify(engineExperienceResult.filter));
                        }
                        const tonnageResult = buildVesselTonnageFilter();
                        if (tonnageResult.error) {
                            preserveCompletedResultsAfterFailure();
                            setAnalysisProgress(prev => ({ ...prev, isAnalyzing: false }));
                            setIsAnalyzeLoading(false);
                            handleSendMessage('error', tonnageResult.error);
                            return;
                        }
                        if (tonnageResult.filter && (tonnageResult.filter.min_value != null || tonnageResult.filter.max_value != null)) {
                            params.set('vessel_tonnage_filter', JSON.stringify(tonnageResult.filter));
                        }
                    }
                    const eventSource = new EventSource(`${getCloudApiBaseUrl()}/analyze_stream?${params.toString()}`);
                    eventSourceRef.current = eventSource;

                    const finishStream = () => {
                        setAnalysisProgress(prev => ({ ...prev, isAnalyzing: false }));
                        setIsAnalyzeLoading(false);
                        eventSource.close();
                        if (eventSourceRef.current === eventSource) eventSourceRef.current = null;
                    };

                    eventSource.onmessage = (event) => {
                        const data = JSON.parse(event.data);
                        if (data.type === 'status') {
                            setAnalysisProgress(prev => ({ ...prev, message: data.message }));
                        } else if (data.type === 'indexing_start' || data.type === 'indexing_progress') {
                            setAnalysisProgress(prev => ({
                                ...prev,
                                stage: 'indexing',
                                current: data.current || 0,
                                total: data.total || prev.total || 0,
                                message: data.message || 'Indexing resumes...'
                            }));
                        } else if (data.type === 'indexing_complete') {
                            setAnalysisProgress(prev => ({
                                ...prev,
                                stage: 'analyzing',
                                current: 0,
                                total: prev.total || 0,
                                message: data.message || 'Indexing complete. Starting AI analysis...'
                            }));
                        } else if (data.type === 'progress') {
                            setAnalysisProgress(prev => ({
                                ...prev,
                                stage: 'analyzing',
                                current: data.current,
                                total: data.total || prev.total,
                                message: isRefinement
                                    ? `Analyzing ${data.current || 0} of ${data.total || prev.total || refinementAvailability.candidateCount} candidates from the previous verified matches.`
                                    : data.message
                            }));
                        } else if (data.type === 'match_found') {
                            setAnalysisProgress(prev => ({
                                ...prev,
                                liveVerified: [...prev.liveVerified, data.match],
                                current: data.current,
                                total: data.total || prev.total
                            }));
                        } else if (data.type === 'uncertain_found') {
                            setAnalysisProgress(prev => ({
                                ...prev,
                                liveUncertain: [...prev.liveUncertain, data.match],
                                current: data.current,
                                total: data.total || prev.total
                            }));
                        } else if (data.type === 'hard_filter_unknown') {
                            setAnalysisProgress(prev => ({
                                ...prev,
                                liveUnknown: [...prev.liveUnknown, data.match],
                                current: data.current,
                                total: data.total || prev.total
                            }));
                        } else if (data.type === 'complete') {
                            const completedResults = {
                                ...data,
                                success: true,
                                verified_matches: data.verified_matches || [],
                                uncertain_matches: data.uncertain_matches || [],
                                unknown_matches: data.unknown_matches || [],
                                hard_filter_summary: data.hard_filter_summary || {},
                                graceful_failure: false,
                            };
                            setAnalysisResults(completedResults);
                            analysisResultsRef.current = completedResults;
                            const step = { prompt, results: completedResults };
                            setSearchChain(prev => {
                                const nextChain = aiSearchState.buildNextSearchChain({
                                    previousChain: prev,
                                    step,
                                    isRefinement,
                                    maxSteps: 10,
                                });
                                setActiveSearchStepIndex(nextChain.length - 1);
                                return nextChain;
                            });
                            const verifiedCount = completedResults.verified_matches.length;
                            const refinement = completedResults.refinement || {};
                            const nextAvailable = Boolean(refinement.available && verifiedCount > 0);
                            setRefinementAvailability({
                                available: nextAvailable,
                                candidateCount: Number(refinement.candidate_scope_member_count || verifiedCount),
                                reason: refinement.message || (verifiedCount ? '' : 'No verified matches are available to refine.'),
                                parentSearchSessionId: completedResults.search_session?.search_session_id || '',
                            });
                            if (isRefinement) {
                                setRefinementMode(true);
                                setRefinementState(verifiedCount === 0 ? 'active_zero_result' : (nextAvailable ? 'active_idle' : 'disabled'));
                            } else {
                                setRefinementState(nextAvailable ? 'available' : 'disabled');
                            }
                            finishStream();
                            handleSendMessage('success', data.message || 'Analysis complete.');
                        } else if (data.type === 'graceful_failure') {
                            if (!isRefinement) {
                                setAnalysisResults({
                                    ...data,
                                    success: false,
                                    verified_matches: [],
                                    uncertain_matches: [],
                                    unknown_matches: [],
                                    hard_filter_summary: data.hard_filter_summary || { scanned: 0, passed: 0, failed: 0, unknown: 0, matched: 0 },
                                    graceful_failure: true,
                                });
                            } else {
                                setRefinementState('active_idle');
                            }
                            finishStream();
                            handleSendMessage('warning', data.message);
                        } else if (data.type === 'error' || data.type === 'request_status') {
                            preserveCompletedResultsAfterFailure();
                            finishStream();
                            handleSendMessage(data.retryable ? 'warning' : 'error', data.message || 'Analysis failed.');
                        }
                    };

                    eventSource.onerror = (error) => {
                        console.error('EventSource error:', error);
                        preserveCompletedResultsAfterFailure({ markServiceUnreachable: true });
                        finishStream();
                        handleSendMessage('error', 'Connection to server lost. Previous completed results were preserved.');
                    };
                } catch (error) {
                    console.error('Analysis error:', error);
                    preserveCompletedResultsAfterFailure({ markServiceUnreachable: true });
                    setAnalysisProgress(prev => ({ ...prev, isAnalyzing: false }));
                    setIsAnalyzeLoading(false);
                    handleSendMessage('error', 'Failed to connect to backend. Previous completed results were preserved.');
                }
            };

            const handleAnalyze = async () => {
                if (!selectedRankFolder) return handleSendMessage('error', 'Please select a rank folder to analyze.');
                if (!aiPrompt.trim()) return handleSendMessage('error', 'AI prompt cannot be empty.');
                if (isViewingHistoricalSearchStep) {
                    return handleSendMessage('warning', 'You are viewing an earlier result set. Return to latest results to refine further.');
                }
                if (!refinementMode) {
                    const tonnageResult = buildVesselTonnageFilter();
                    if (tonnageResult.error) {
                        return handleSendMessage('error', tonnageResult.error);
                    }
                    return startAnalysis({ mode: 'root', prompt: aiPrompt.trim() });
                }
                try {
                    const preflight = await fetchRefinementPreflight();
                    const resolvedCount = Number(preflight.scope_summary?.resolved_count || 0);
                    if (!resolvedCount) {
                        throw new Error('None of the previous verified candidates are currently available to refine.');
                    }
                    setChangedContentAcknowledged(false);
                    refinementConfirmInitiatorRef.current = document.activeElement;
                    setPendingRefinementConfirmation({
                        preflight,
                        prompt: aiPrompt.trim(),
                        requestId: newSearchRequestId(),
                        parentSearchSessionId: currentParentSearchSessionId(),
                    });
                } catch (error) {
                    if (!error.retryable) {
                        setRefinementMode(false);
                        setRefinementState('disabled');
                    }
                    handleSendMessage(error.retryable ? 'warning' : 'error', error.message);
                }
            };

            const handleConfirmRefinement = async () => {
                const pending = pendingRefinementConfirmation;
                if (!pending || isRefinementConfirming) return;
                setIsRefinementConfirming(true);
                try {
                    const fingerprint = String(
                        pending.preflight?.scope_summary?.changed_content_set_fingerprint || ''
                    );
                    let acknowledgementId = '';
                    if (fingerprint) {
                        if (!changedContentAcknowledged) return;
                        const response = await fetch(
                            `${API_BASE_URL}/ai_search/refinement_scope/changed_content_acknowledgements`,
                            {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    parent_search_session_id: pending.parentSearchSessionId,
                                    search_request_id: pending.requestId,
                                    changed_content_set_fingerprint: fingerprint,
                                }),
                            }
                        );
                        const data = await response.json().catch(() => ({}));
                        if (!response.ok || !data.success) {
                            setChangedContentAcknowledged(false);
                            handleSendMessage('warning', data.message || 'The changed resume set must be reviewed again.');
                            return;
                        }
                        acknowledgementId = data.acknowledgement_id || '';
                    }
                    await startAnalysis({
                        mode: 'refinement',
                        requestId: pending.requestId,
                        parentSearchSessionId: pending.parentSearchSessionId,
                        acknowledgementId,
                        prompt: pending.prompt,
                    });
                } catch (error) {
                    setServiceRecovery({
                        state: 'backend_unreachable',
                        message: 'NjordHR service is unavailable. Completed AI Search results are preserved.',
                        recovering: false,
                    });
                    handleSendMessage('error', error?.message || 'Could not confirm the refinement. Previous completed results were preserved.');
                } finally {
                    setIsRefinementConfirming(false);
                }
            };

            const applySearchStepView = (index, chain = searchChain) => {
                const view = aiSearchState.deriveSearchStepView(index, chain);
                if (!view) return;
                setActiveSearchStepIndex(view.boundedIndex);
                setAnalysisResults(view.results);
                analysisResultsRef.current = view.results;
                setRefinementAvailability(view.refinementAvailability);
                if (view.isLatestStep) {
                    setRefinementState(view.refinementState);
                } else {
                    setRefinementMode(view.refinementMode);
                    setRefinementState(view.refinementState);
                }
            };

            const handleViewSearchStep = (index) => {
                applySearchStepView(index);
            };

            const handleViewLatestSearchStep = () => {
                if (searchChain.length === 0) return;
                applySearchStepView(searchChain.length - 1);
            };

            const handleViewPreviousSearch = () => {
                if (searchChain.length < 2) return;
                const currentIndex = activeSearchStepIndex >= 0 ? activeSearchStepIndex : searchChain.length - 1;
                applySearchStepView(Math.max(0, currentIndex - 1));
            };

            const handleRemoveLatestRefinement = () => {
                if (searchChain.length < 2) return;
                const confirmed = window.confirm('Remove the latest refinement? The previous result set will become the latest refinable search.');
                if (!confirmed) return;
                const removal = aiSearchState.removeLatestRefinement(searchChain);
                if (!removal.canRemove) return;
                setSearchChain(removal.chain);
                setAiPrompt(removal.prompt);
                applySearchStepView(removal.chain.length - 1, removal.chain);
            };

            const handleStartNewSearch = async () => {
                const confirmed = window.confirm('Start a new AI Search? This will clear the recovered AI Search prompt, results, and refinement chain from this device.');
                if (!confirmed) return;
                try {
                    await fetch(`${API_BASE_URL}/ai_search/recovery_draft`, {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ tab_id: recoveryTabIdRef.current }),
                    });
                } catch (_error) {}
                setAnalysisResults(null);
                analysisResultsRef.current = null;
                setSearchChain([]);
                setActiveSearchStepIndex(-1);
                setRefinementMode(false);
                setRefinementState('disabled');
                setRefinementAvailability({
                    available: false,
                    candidateCount: 0,
                    reason: 'Available after a search returns at least one verified match.',
                    parentSearchSessionId: '',
                });
                setRecoveryNotice(null);
            };

            const recoveryCard = (card) => ({
                schema_version: 'recovery_result_card.v1',
                filename: String(card?.filename || ''),
                candidate_scope_id: String(card?.candidate_scope_id || ''),
                content_hash: String(card?.content_hash || '').toLowerCase(),
                result_bucket: String(card?.result_bucket || ''),
                confidence: typeof card?.confidence === 'number' ? card.confidence : null,
                lineage_warning_codes: Array.isArray(card?.lineage_warning_codes) ? card.lineage_warning_codes : [],
                evidence_review_badges: Array.isArray(card?.evidence_review_badges)
                    ? card.evidence_review_badges
                    : (Array.isArray(card?.evidence_review_reasons) ? card.evidence_review_reasons : []),
                detail_available_after_recovery: false,
            });

            const recoveryResults = (results) => {
                if (!results) return null;
                return {
                    schema_version: 'recovery_results.v1',
                    verified_matches: (results.verified_matches || []).map(recoveryCard),
                    uncertain_matches: (results.uncertain_matches || []).map(recoveryCard),
                    unknown_matches: (results.unknown_matches || []).map(recoveryCard),
                    hard_filter_summary: results.hard_filter_summary || {},
                    search_session: results.search_session || {},
                    search_context: results.search_context || {},
                    scope_summary: results.scope_summary || {},
                    refinement: results.refinement || {},
                    message: results.message || '',
                };
            };

            const buildRecoveryDraft = (reason = 'checkpoint') => ({
                schema_version: 'ai_search_recovery.v1',
                recovery_reason: reason,
                active_tab: activeTab,
                search_state: {
                    prompt: aiPrompt,
                    selected_rank_folder: selectedRankFolder,
                    applied_ship_type: selectedSearchShipType,
                    experience_ship_type_filter: buildExperienceFilterFromRows({
                        rows: experienceShipTypeRows,
                        familyKey: 'ship_family',
                        type: 'experience_ship_type',
                    }).filter || {},
                    engine_experience_filter: buildExperienceFilterFromRows({
                        rows: engineExperienceRows,
                        familyKey: 'engine_family',
                        type: 'engine_experience',
                    }).filter || {},
                    vessel_tonnage_filter: buildVesselTonnageFilter().filter || {},
                    refinement_state: refinementState,
                    active_search_step_index: activeSearchStepIndex,
                    current_completed_results: recoveryResults(analysisResultsRef.current),
                    search_chain: searchChain.map(step => ({
                        prompt: step.prompt,
                        results: recoveryResults(step.results),
                    })),
                    refinement_availability: refinementAvailability,
                    interrupted_attempt: analysisProgress.isAnalyzing ? {
                        search_request_id: '',
                        prompt_summary: aiPrompt.slice(0, 60),
                        parent_search_session_id: currentParentSearchSessionId() || null,
                        attempted_at: new Date().toISOString(),
                        interruption_reason: 'renderer_unload',
                    } : null,
                },
            });

            const saveRecoveryDraft = async (reason = 'checkpoint') => {
                if (!authUser) return;
                try {
                    await fetch(`${API_BASE_URL}/ai_search/recovery_draft`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            tab_id: recoveryTabIdRef.current,
                            draft: buildRecoveryDraft(reason),
                        }),
                        keepalive: reason === 'renderer_unload' || reason === 'service_restart',
                    });
                } catch (_error) {
                    // Recovery storage is best effort and must not block AI Search.
                }
            };

            const restoreRecoveryDraft = async () => {
                if (!authUser || recoveryLoadedRef.current) return;
                recoveryLoadedRef.current = true;
                try {
                    const response = await fetch(`${API_BASE_URL}/ai_search/recovery_draft`);
                    const data = await response.json();
                    const record = data?.draft;
                    const draft = record?.draft;
                    const state = draft?.search_state;
                    if (!response.ok || !data.success || !state) return;
                    const restored = aiSearchState.deriveRecoveredSearchState(state);
                    const restoredExperienceItems = Array.isArray(restored.experienceShipTypeFilter?.items)
                        ? restored.experienceShipTypeFilter.items
                        : [];
                    const restoredEngineItems = Array.isArray(restored.engineExperienceFilter?.items)
                        ? restored.engineExperienceFilter.items
                        : [];
                    setAiPrompt(restored.prompt);
                    setSelectedRankFolder(restored.selectedRankFolder);
                    setSelectedSearchShipType(restored.appliedShipType);
                    setExperienceShipTypeRows(
                        restoredExperienceItems.length
                            ? restoredExperienceItems.map(item => createExperienceFilterRow({
                                family: item?.ship_family || '',
                                recency_mode: item?.years_back ? 'years_back' : (item?.contract_count ? 'contract_count' : 'any_time'),
                                years_back: item?.years_back != null ? String(item.years_back) : '',
                                contract_count: item?.contract_count != null ? String(item.contract_count) : '3',
                                minimum_months: item?.minimum_months != null ? String(item.minimum_months) : '',
                            }))
                            : (
                                restored.experiencedShipType
                                    ? [createExperienceFilterRow({ family: reconcileFamilyOptionValue(restored.experiencedShipType, shipTypes) || restored.experiencedShipType })]
                                    : []
                            )
                    );
                    setEngineExperienceRows(
                        restoredEngineItems.map(item => createExperienceFilterRow({
                            family: item?.engine_family || '',
                            recency_mode: item?.years_back ? 'years_back' : (item?.contract_count ? 'contract_count' : 'any_time'),
                            years_back: item?.years_back != null ? String(item.years_back) : '',
                            contract_count: item?.contract_count != null ? String(item.contract_count) : '3',
                            minimum_months: item?.minimum_months != null ? String(item.minimum_months) : '',
                        }))
                    );
                    setVesselTonnageMin(
                        restored.vesselTonnageFilter?.min_value != null
                            ? String(restored.vesselTonnageFilter.min_value)
                            : ''
                    );
                    setVesselTonnageMax(
                        restored.vesselTonnageFilter?.max_value != null
                            ? String(restored.vesselTonnageFilter.max_value)
                            : ''
                    );
                    setVesselTonnageUnit(restored.vesselTonnageFilter?.unit || 'any');
                    setVesselTonnageYearsBack(
                        restored.vesselTonnageFilter?.years_back != null
                            ? String(restored.vesselTonnageFilter.years_back)
                            : ''
                    );
                    setAnalysisResults(restored.restoredResults);
                    analysisResultsRef.current = restored.restoredResults;
                    setSearchChain(restored.restoredChain);
                    setActiveSearchStepIndex(restored.restoredIndex);
                    setRefinementAvailability(restored.refinementAvailability);
                    setRefinementMode(restored.refinementMode);
                    setRefinementState(restored.refinementState);
                    if (canAccessTab(draft.active_tab)) setActiveTab(draft.active_tab);
                    setRecoveryNotice({
                        completeness: draft.recovery_completeness || 'full',
                        savedAt: record.saved_at || '',
                        interrupted: Boolean(state.interrupted_attempt),
                    });
                    const parentId = restored.parentSearchSessionIdForPreflight;
                    if (state.refinement_availability?.available && parentId) {
                        try {
                            await fetchRefinementPreflight(parentId);
                        } catch (error) {
                            setRefinementMode(false);
                            setRefinementState(error.retryable ? 'available' : 'disabled');
                            setRefinementAvailability(prev => ({ ...prev, available: Boolean(error.retryable), reason: error.message }));
                        }
                    }
                } catch (_error) {
                    // A missing or unavailable draft starts a normal fresh session.
                }
            };

            const checkBackendRecovery = async () => {
                try {
                    const response = await fetch(`${API_BASE_URL}/runtime/ready`, { cache: 'no-store' });
                    if (!response.ok) throw new Error('Backend not ready');
                    setServiceRecovery(prev => (
                        prev.state === 'healthy'
                            ? prev
                            : { state: 'recovered', message: 'NjordHR service reconnected. Your completed AI Search state was preserved.', recovering: false }
                    ));
                    return true;
                } catch (_error) {
                    setServiceRecovery({ state: 'backend_unreachable', message: 'NjordHR service is unavailable. Completed AI Search results are preserved.', recovering: false });
                    return false;
                }
            };

            const handleReconnectLocalServices = async () => {
                setServiceRecovery(prev => ({ ...prev, state: 'recovering', recovering: true }));
                await saveRecoveryDraft('service_restart');
                try {
                    if (window.NjordDesktop?.restartLocalServices) {
                        await window.NjordDesktop.restartLocalServices({ backend: true, agent: false });
                    }
                    let recovered = false;
                    for (let attempt = 0; attempt < 12; attempt += 1) {
                        if (await checkBackendRecovery()) {
                            recovered = true;
                            break;
                        }
                        await new Promise(resolve => setTimeout(resolve, Math.min(5000, 500 * (2 ** Math.min(attempt, 3)))));
                    }
                    if (!recovered) {
                        setServiceRecovery({ state: 'recovery_failed', message: 'NjordHR service is still unavailable. Open logs or restart it using the NjordHR launcher.', recovering: false });
                        return;
                    }
                    await fetchRuntimeConfig();
                    const parentId = currentParentSearchSessionId();
                    if (refinementMode && parentId) {
                        await fetchRefinementPreflight(parentId);
                    }
                    setServiceRecovery({ state: 'healthy', message: '', recovering: false });
                } catch (error) {
                    setServiceRecovery({ state: 'recovery_failed', message: error?.message || 'Local service recovery failed.', recovering: false });
                }
            };

            useEffect(() => {
                analysisResultsRef.current = analysisResults;
            }, [analysisResults]);

            useEffect(() => {
                if (pendingRefinementConfirmation) {
                    window.setTimeout(() => refinementCancelButtonRef.current?.focus(), 0);
                    return;
                }
                refinementConfirmInitiatorRef.current?.focus?.();
                refinementConfirmInitiatorRef.current = null;
            }, [pendingRefinementConfirmation]);

            useEffect(() => {
                if (!authUser) {
                    recoveryLoadedRef.current = false;
                    return;
                }
                restoreRecoveryDraft();
            }, [authUser]);

            useEffect(() => {
                if (!authUser || !recoveryLoadedRef.current) return undefined;
                const timer = setTimeout(() => saveRecoveryDraft('checkpoint'), 800);
                return () => clearTimeout(timer);
            }, [
                authUser, activeTab, aiPrompt, selectedRankFolder, selectedSearchShipType,
                experienceShipTypeRows, engineExperienceRows,
                vesselTonnageMin, vesselTonnageMax, vesselTonnageUnit, vesselTonnageYearsBack,
                refinementState, refinementAvailability,
                analysisResults, searchChain, activeSearchStepIndex,
            ]);

            useEffect(() => {
                if (!authUser) return undefined;
                const check = () => checkBackendRecovery();
                const visibilityCheck = () => {
                    if (document.visibilityState === 'visible') check();
                };
                check();
                const poller = setInterval(check, 15000);
                window.addEventListener('online', check);
                document.addEventListener('visibilitychange', visibilityCheck);
                return () => {
                    clearInterval(poller);
                    window.removeEventListener('online', check);
                    document.removeEventListener('visibilitychange', visibilityCheck);
                };
            }, [authUser]);

            useEffect(() => {
                const checkpoint = () => saveRecoveryDraft('renderer_unload');
                window.addEventListener('pagehide', checkpoint);
                return () => window.removeEventListener('pagehide', checkpoint);
            }, [authUser, activeTab, aiPrompt, analysisResults, searchChain, refinementState, activeSearchStepIndex]);

            const handleFeedback = async (filename, llmDecision, reason, confidence, userDecision) => {
                const notes = feedbackNotes[filename] || '';
                
                try {
                    await fetch(`${getCloudApiBaseUrl()}/submit_feedback`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            filename,
                            query: aiPrompt,
                            llm_decision: llmDecision,
                            llm_reason: reason,
                            llm_confidence: confidence,
                            user_decision: userDecision,
                            user_notes: notes
                        })
                    });
                    
                    handleSendMessage('success', `Feedback recorded for ${filename}`);
                    
                    setAnalysisResults(prev => ({
                        ...prev,
                        uncertain_matches: prev.uncertain_matches.filter(m => m.filename !== filename),
                        verified_matches: userDecision === 'approve' 
                            ? [...prev.verified_matches, { filename, reason, confidence }]
                            : prev.verified_matches
                    }));
                } catch (error) {
                    handleSendMessage('error', 'Failed to submit feedback');
                }
            };

            const handleFileSelection = (filename) => {
                const newSelection = new Set(selectedFiles);
                if (newSelection.has(filename)) {
                    newSelection.delete(filename);
                } else {
                    newSelection.add(filename);
                }
                setSelectedFiles(newSelection);
            };
            
            const handleSelectAll = (e) => {
                if (e.target.checked) {
                    const allFilenames = new Set(analysisResults.verified_matches.map(m => m.filename));
                    setSelectedFiles(allFilenames);
                } else {
                    setSelectedFiles(new Set());
                }
            };
            
            const handleVerifyResumes = async () => {
                if (selectedFiles.size === 0) return handleSendMessage('error', 'No files selected to verify.');
                
                const fileCount = selectedFiles.size;
                setIsVerifyingResumes(true);
                setVerifyStatus('processing');
                
                try {
                    const matchData = {};
                    
                    if (analysisResults && analysisResults.verified_matches) {
                        analysisResults.verified_matches.forEach(match => {
                            if (selectedFiles.has(match.filename)) {
                                matchData[match.filename] = {
                                    reason: match.reason,
                                    confidence: match.confidence
                                };
                            }
                        });
                    }
                    
                    const response = await fetch(`${getCloudApiBaseUrl()}/verify_resumes`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            rank_folder: selectedRankFolder,
                            search_ship_type: selectedSearchShipType,
                            filenames: Array.from(selectedFiles),
                            match_data: matchData,
                            ai_prompt: aiPrompt
                        }),
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        setVerifyStatus('completed');
                        setReviewCompleted(true);
                        const warningText = (data.errors && data.errors.length > 0)
                            ? ` Warnings: ${data.errors.length} issue(s).`
                            : '';
                        const backendText = data.persistence_backend ? ` Backend: ${data.persistence_backend}.` : '';
                        handleSendMessage('success', `✅ Successfully processed ${data.processed} file(s) and updated dashboard data.${warningText}${backendText}`);
                        
                        setAnalysisResults({
                            ...analysisResults,
                            verified_matches: analysisResults.verified_matches.filter(
                                m => !selectedFiles.has(m.filename)
                            )
                        });
                        
                        setSelectedFiles(new Set());
                        fetchAvailableRanks();
                        fetchDashboardData({ resetPage: true });
                        
                        setTimeout(() => {
                            setVerifyStatus('idle');
                            setIsVerifyingResumes(false);
                        }, 2000);
                    } else {
                        const details = (data.errors && data.errors.length > 0)
                            ? ` ${data.errors.slice(0, 2).join(' | ')}`
                            : '';
                        handleSendMessage('error', (data.message || 'Failed to verify resumes.') + details);
                        setVerifyStatus('idle');
                        setIsVerifyingResumes(false);
                    }

                if (confidence < 0.5) colorClass = 'bg-orange-100 text-orange-800';

                const primaryLines = formatted.primary;
                const matchedFilterLines = formatted.matchedFilters;
                const recruiterCheckLines = formatted.recruiterChecks;
                const contextLines = formatted.context;
                if (primaryLines.length === 0 && matchedFilterLines.length === 0 && recruiterCheckLines.length === 0 && contextLines.length === 0) {

                                                                {row.filename}

                                                        <td className="px-4 py-3 whitespace-nowrap text-gray-600">
                                                            {formatDate(row.date_added)}
                                                        </td>
                                                        <td className="px-4 py-3 whitespace-nowrap font-medium">
                                                            {row.name}
                                                        </td>
                                                        <td className="px-4 py-3 whitespace-nowrap">
                                                            <div>{(row.rank_applied_for || '').replace(/_/g, ' ') || '-'}</div>

                                                        <td className="px-4 py-3 whitespace-nowrap text-gray-600">
                                                            {row.email}
